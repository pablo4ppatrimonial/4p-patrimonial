<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4P Patrimonial — CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --sidebar: #111111;
      --card: #161616;
      --border: #222222;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.12);
      --text: #e8e8e8;
      --text-dim: #777;
      --danger: #e53e3e;
      --success: #38a169;
      --warning: #d69e2e;
      --info: #3182ce;
      --purple: #805ad5;
      --orange: #dd6b20;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ── LOGIN ── */
    #loginScreen {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: var(--bg); z-index: 1000;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-top: 3px solid var(--gold); border-radius: 14px;
      padding: 52px 44px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 1px; margin-bottom: 4px; }
    .login-sub { color: var(--text-dim); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    .login-box input {
      width: 100%; padding: 13px 16px; background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
      margin-bottom: 10px; outline: none; transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--gold); color: #000; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity .2s; margin-top: 4px; letter-spacing: .3px;
    }
    .login-btn:hover { opacity: .85; }
    .login-error { color: var(--danger); font-size: 12px; margin-top: 10px; display: none; }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-width: 240px; background: var(--sidebar);
      border-right: 1px solid var(--gold); display: flex;
      flex-direction: column; overflow-y: auto; transition: transform .3s; z-index: 200;
    }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-name { font-size: 16px; font-weight: 800; color: var(--gold); letter-spacing: .5px; }
    .sidebar-logo-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { padding: 10px 0; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 11px 20px;
      cursor: pointer; color: var(--text-dim); font-size: 13px; font-weight: 500;
      transition: all .15s; border-left: 3px solid transparent; user-select: none;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .nav-item.active { color: var(--gold); background: var(--gold-dim); border-left-color: var(--gold); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 11px; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none; position: fixed; top: 15px; left: 15px; z-index: 201;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; cursor: pointer; font-size: 17px; color: var(--gold);
    }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 199;
    }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .topbar h1 { font-size: 19px; font-weight: 700; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .content { padding: 24px 28px; flex: 1; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { opacity: .85; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #444; background: rgba(255,255,255,.04); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 5px 7px; }

    /* ── CARDS ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .card-icon { font-size: 22px; margin-bottom: 10px; }
    .card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .card-value { font-size: 26px; font-weight: 700; }
    .card-value.gold { color: var(--gold); }
    .card-value.green { color: var(--success); }
    .card-value.red { color: var(--danger); }

    /* ── SECTION TITLE ── */
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

    /* ── TABLE ── */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; overflow-x: auto; }
    .table-wrap table { width: 100%; border-collapse: collapse; min-width: 600px; }
    table th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); white-space: nowrap; }
    table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,.04); color: var(--text); font-size: 13px; }
    table tr:last-child td { border-bottom: none; }
    table tr:hover td { background: rgba(255,255,255,.02); }
    .table-actions { display: flex; gap: 4px; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .2px; white-space: nowrap; }
    .badge-lead { background: rgba(49,130,206,.18); color: #63b3ed; }
    .badge-contato { background: rgba(128,90,213,.18); color: #b794f4; }
    .badge-qualificado { background: rgba(214,158,46,.18); color: #f6e05e; }
    .badge-proposta { background: rgba(221,107,32,.18); color: #fbd38d; }
    .badge-negociacao { background: rgba(229,62,62,.18); color: #fc8181; }
    .badge-fechado { background: rgba(56,161,105,.18); color: #68d391; }
    .badge-perdido { background: rgba(100,100,100,.18); color: #a0aec0; }
    .badge-aberto { background: rgba(229,62,62,.18); color: #fc8181; }
    .badge-em_andamento { background: rgba(214,158,46,.18); color: #f6e05e; }
    .badge-resolvido { background: rgba(56,161,105,.18); color: #68d391; }
    .badge-baixa { background: rgba(56,161,105,.18); color: #68d391; }
    .badge-media { background: rgba(214,158,46,.18); color: #f6e05e; }
    .badge-alta { background: rgba(229,62,62,.18); color: #fc8181; }
    .badge-pendente { background: rgba(100,100,100,.18); color: #a0aec0; }
    .badge-concluida { background: rgba(56,161,105,.18); color: #68d391; }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 13px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .2s; }
    .filter-input:focus { border-color: var(--gold); }
    .filter-input::placeholder { color: var(--text-dim); }
    select.filter-input option { background: #1a1a1a; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-lg { max-width: 720px; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 2px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; }
    .form-control { background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .2s; width: 100%; }
    .form-control:focus { border-color: var(--gold); }
    .form-control option { background: #1a1a1a; }
    textarea.form-control { resize: vertical; min-height: 78px; }

    /* ── KANBAN ── */
    .kanban-board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; min-height: 520px; }
    .kanban-col { min-width: 210px; width: 210px; flex-shrink: 0; }
    .kanban-col-header { background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0; padding: 11px 13px; display: flex; align-items: center; justify-content: space-between; border-bottom: none; }
    .kanban-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); }
    .kanban-count { background: rgba(255,255,255,.08); border-radius: 12px; padding: 2px 7px; font-size: 11px; color: var(--text-dim); }
    .kanban-cards { background: rgba(22,22,22,.7); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 8px; min-height: 420px; display: flex; flex-direction: column; gap: 7px; transition: background .15s, border-color .15s; }
    .kanban-cards.drag-over { background: var(--gold-dim); border-color: var(--gold); }
    .kanban-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; cursor: grab; transition: box-shadow .1s, opacity .1s; }
    .kanban-card:hover { border-color: #333; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card.dragging { opacity: .45; }
    .kanban-card-name { font-size: 13px; font-weight: 600; margin-bottom: 7px; }
    .kanban-card-info { font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 3px; }

    /* ── BAR CHART ── */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; padding: 4px 0; }
    .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-value { font-size: 10px; color: var(--text-dim); }
    .bar-fill { background: var(--gold); border-radius: 3px 3px 0 0; width: 100%; min-height: 3px; }
    .bar-label { font-size: 10px; color: var(--text-dim); }

    /* ── FUNNEL ── */
    .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .funnel-label { font-size: 12px; color: var(--text-dim); width: 90px; flex-shrink: 0; }
    .funnel-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 20px; overflow: hidden; }
    .funnel-bar-fill { height: 100%; border-radius: 4px; background: var(--gold); transition: width .4s; }
    .funnel-count { font-size: 12px; color: var(--text-dim); width: 70px; text-align: right; flex-shrink: 0; }

    /* ── TOAST ── */
    #toastContainer { position: fixed; bottom: 22px; right: 22px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); font-size: 13px; font-weight: 500; min-width: 250px; box-shadow: 0 8px 28px rgba(0,0,0,.45); animation: slideIn .2s ease; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.info { border-left: 4px solid var(--info); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── STATES ── */
    .empty-state { text-align: center; padding: 44px 20px; color: var(--text-dim); font-size: 13px; }
    .empty-icon { font-size: 38px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 44px; color: var(--text-dim); }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOGGLE GROUP ── */
    .toggle-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .toggle-btn { padding: 7px 15px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; background: transparent; color: var(--text-dim); transition: all .15s; }
    .toggle-btn.active { background: var(--gold); color: #000; }

    /* ── ACTIVITY ── */
    .activity-item { padding: 9px 12px; border-left: 2px solid var(--border); margin-bottom: 7px; }
    .activity-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 2px; }
    .activity-date { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

    /* ── DETAIL ── */
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
    .detail-value { font-size: 13px; font-weight: 500; margin-top: 3px; }

    /* ── MISC ── */
    .wapp-link { color: #25d366; text-decoration: none; font-weight: 600; }
    .wapp-link:hover { text-decoration: underline; }
    .task-check { width: 15px; height: 15px; cursor: pointer; accent-color: var(--gold); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .hamburger { display: flex; align-items: center; }
      .topbar { padding: 14px 14px 14px 58px; }
      .content { padding: 14px; }
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">4P Patrimonial</div>
    <div class="login-sub">CRM · Acesso Restrito</div>
    <input type="password" id="loginPwd" placeholder="Senha de acesso" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-name">4P Patrimonial</div>
      <div class="sidebar-logo-sub">CRM</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
      <div class="nav-item" data-page="leads" onclick="navigate('leads')"><span class="nav-icon">👤</span> Leads</div>
      <div class="nav-item" data-page="pipeline" onclick="navigate('pipeline')"><span class="nav-icon">⚡</span> Pipeline</div>
      <div class="nav-item" data-page="tarefas" onclick="navigate('tarefas')"><span class="nav-icon">✅</span> Tarefas</div>
      <div class="nav-item" data-page="tickets" onclick="navigate('tickets')"><span class="nav-icon">🎫</span> Tickets</div>
      <div class="nav-item" data-page="relatorios" onclick="navigate('relatorios')"><span class="nav-icon">📈</span> Relatórios</div>
      <div class="nav-item" data-page="config" onclick="navigate('config')"><span class="nav-icon">⚙️</span> Configurações</div>
    </nav>
    <div class="sidebar-footer">© 2025 4P Patrimonial</div>
  </aside>

  <div class="main" id="mainContent"></div>
</div>

<div id="toastContainer"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://vfmtntdaohuwitajxyqc.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmbXRudGRhb2h1d2l0YWp4eXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODgyOTksImV4cCI6MjA5MjM2NDI5OX0.ZM5IcM2OhVL5koj68xqP22reVFQ4ZVOR9rJ9ovxeYVI';
const CRM_PWD = '4P@admin2025';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, ANON_KEY);

// ── STATE ─────────────────────────────────────────────────────────────────────
let allLeads = [], allTarefas = [], allTickets = [];
let draggedLeadId = null, relPeriodo = 30;

// ── LOGIN ─────────────────────────────────────────────────────────────────────
document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  if (document.getElementById('loginPwd').value === CRM_PWD) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    navigate('dashboard');
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginPwd').focus();
  }
}

// ── NAV ───────────────────────────────────────────────────────────────────────
const PAGES = ['dashboard','leads','pipeline','tarefas','tickets','relatorios','config'];
const PAGE_FNS = { dashboard: renderDashboard, leads: renderLeads, pipeline: renderPipeline, tarefas: renderTarefas, tickets: renderTickets, relatorios: renderRelatorios, config: renderConfig };

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  closeSidebar();
  (PAGE_FNS[page] || renderDashboard)();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }); }
function fmtR(v) { if (!v && v !== 0) return '—'; return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }).format(v); }

function etapaBadge(e) {
  const m = { lead:'Lead', contato:'Contato', qualificado:'Qualificado', proposta:'Proposta', negociacao:'Negociação', fechado:'Fechado', perdido:'Perdido' };
  return `<span class="badge badge-${e}">${m[e]||e}</span>`;
}
function statusBadge(s) {
  const m = { aberto:'Aberto', em_andamento:'Em andamento', resolvido:'Resolvido' };
  return `<span class="badge badge-${s}">${m[s]||s}</span>`;
}
function priorBadge(p) {
  const m = { baixa:'Baixa', media:'Média', alta:'Alta' };
  return `<span class="badge badge-${p}">${m[p]||p}</span>`;
}
function taskStatusBadge(s) {
  const m = { pendente:'Pendente', em_andamento:'Em andamento', concluida:'Concluída' };
  return `<span class="badge badge-${s}">${m[s]||s}</span>`;
}
function wapp(phone) {
  if (!phone) return '—';
  const clean = phone.replace(/\D/g, '');
  return `<a class="wapp-link" href="https://wa.me/55${clean}" target="_blank">📱 ${phone}</a>`;
}
function loadingHTML() { return `<div class="loading"><div class="spinner"></div><br>Carregando...</div>`; }
function setMain(html) { document.getElementById('mainContent').innerHTML = html; }
function statCard(icon, label, value, cls='') {
  return `<div class="card"><div class="card-icon">${icon}</div><div class="card-label">${label}</div><div class="card-value ${cls}">${value}</div></div>`;
}
function groupBy(arr, fn) {
  return arr.reduce((acc, item) => { const k = fn(item); acc[k] = (acc[k]||0)+1; return acc; }, {});
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✗':'ℹ'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(html, large=false) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal${large?' modal-lg':''}">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
  });
  document.body.appendChild(overlay);
  return overlay;
}
function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
async function renderDashboard() {
  setMain(`<div class="topbar"><h1>📊 Dashboard</h1></div><div class="content">${loadingHTML()}</div>`);
  try {
    const hoje = new Date().toISOString().split('T')[0];
    const inicioMes = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();

    const [{ data: leads }, { data: tarefas }, { data: tickets }, { data: negocios }] = await Promise.all([
      db.from('crm_leads').select('*').order('criado_em', { ascending: false }),
      db.from('crm_tarefas').select('*'),
      db.from('crm_tickets').select('*'),
      db.from('crm_negocios').select('*'),
    ]);

    const L = leads||[], T = tarefas||[], TK = tickets||[], N = negocios||[];
    const novosHoje = L.filter(l => l.criado_em?.startsWith(hoje)).length;
    const emNeg = L.filter(l => ['proposta','negociacao'].includes(l.etapa)).length;
    const fechadosMes = L.filter(l => l.etapa==='fechado' && l.criado_em >= inicioMes).length;
    const totalFechados = L.filter(l => l.etapa==='fechado').length;
    const taxa = L.length > 0 ? (totalFechados/L.length*100).toFixed(1) : '0';
    const receitaPrev = N.filter(n => n.status!=='perdido').reduce((s,n) => s+(n.valor||0), 0);
    const tarefasPend = T.filter(t => t.status!=='concluida').length;
    const tkAbertos = TK.filter(t => t.status==='aberto').length;

    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const ds = d.toISOString().split('T')[0];
      days.push({ label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), count: L.filter(l => l.criado_em?.startsWith(ds)).length });
    }
    const maxDay = Math.max(...days.map(d => d.count), 1);
    const quentes = L.filter(l => (l.score||0)>0 || l.etapa==='negociacao').slice(0,8);

    setMain(`
      <div class="topbar">
        <h1>📊 Dashboard</h1>
        <div class="topbar-actions"><span style="color:var(--text-dim);font-size:12px">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</span></div>
      </div>
      <div class="content">
        <div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(175px,1fr))">
          ${statCard('👤','Total de Leads', L.length)}
          ${statCard('🆕','Novos Hoje', novosHoje)}
          ${statCard('🔥','Em Negociação', emNeg)}
          ${statCard('🏆','Fechados no Mês', fechadosMes,'green')}
          ${statCard('📊','Taxa de Conversão', taxa+'%','gold')}
          ${statCard('💰','Receita Prevista', fmtR(receitaPrev),'gold')}
          ${statCard('✅','Tarefas Pendentes', tarefasPend, tarefasPend>0?'red':'')}
          ${statCard('🎫','Tickets Abertos', tkAbertos, tkAbertos>0?'red':'')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px">
          <div class="card">
            <div class="section-title">Leads — Últimos 7 dias</div>
            <div class="bar-chart">
              ${days.map(d => `
                <div class="bar-item">
                  <div class="bar-value">${d.count||''}</div>
                  <div class="bar-fill" style="height:${Math.max((d.count/maxDay)*72, d.count>0?6:3)}px"></div>
                  <div class="bar-label">${d.label}</div>
                </div>`).join('')}
            </div>
          </div>
          <div class="card">
            <div class="section-title">Leads por Etapa</div>
            ${['lead','contato','qualificado','proposta','negociacao','fechado','perdido'].map(e => {
              const cnt = L.filter(l => l.etapa===e).length;
              const pct = L.length>0 ? (cnt/L.length*100).toFixed(0) : 0;
              return `<div class="funnel-row">
                <div class="funnel-label">${etapaBadge(e)}</div>
                <div class="funnel-bar-wrap"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
                <div class="funnel-count">${cnt}</div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <div class="section-title">Leads Quentes</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>Cidade</th><th>Capital</th><th>Etapa</th><th>Score</th><th>Responsável</th></tr></thead>
            <tbody>
              ${quentes.length===0
                ? `<tr><td colspan="6"><div class="empty-state">Nenhum lead quente no momento</div></td></tr>`
                : quentes.map(l => `<tr>
                    <td><strong>${l.nome||'—'}</strong></td>
                    <td>${l.cidade||'—'}</td>
                    <td>${fmtR(l.capital_disponivel)}</td>
                    <td>${etapaBadge(l.etapa)}</td>
                    <td><strong style="color:var(--gold)">${l.score||0}</strong></td>
                    <td>${l.responsavel||'—'}</td>
                  </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`);
  } catch(err) {
    setMain(`<div class="topbar"><h1>📊 Dashboard</h1></div><div class="content"><div class="empty-state">Erro ao carregar: ${err.message}</div></div>`);
    toast('Erro ao carregar dashboard', 'error');
  }
}

async function renderLeads() {
  setMain(`<div class="topbar"><h1>👤 Leads</h1></div><div class="content">${loadingHTML()}</div>`);
  const { data, error } = await db.from('crm_leads').select('*').order('criado_em', { ascending: false });
  if (error) { toast('Erro ao carregar leads', 'error'); return; }
  allLeads = data || [];
  buildLeadsPage(allLeads);
}

function buildLeadsPage(leads) {
  setMain(`
    <div class="topbar">
      <h1>👤 Leads</h1>
      <div class="topbar-actions"><button class="btn btn-primary" onclick="openNewLead()">+ Novo Lead</button></div>
    </div>
    <div class="content">
      <div class="filters">
        <input class="filter-input" id="filterNome" placeholder="🔍 Buscar por nome ou e-mail..." style="flex:1;min-width:180px" oninput="filterLeads()">
        <select class="filter-input" id="filterEtapa" onchange="filterLeads()">
          <option value="">Todas as etapas</option>
          <option>lead</option><option>contato</option><option>qualificado</option>
          <option>proposta</option><option>negociacao</option><option>fechado</option><option>perdido</option>
        </select>
        <select class="filter-input" id="filterCapital" onchange="filterLeads()">
          <option value="">Qualquer capital</option>
          <option value="500000">500k+</option>
          <option value="1000000">1M+</option>
          <option value="5000000">5M+</option>
        </select>
      </div>
      <div id="leadsTableWrap"></div>
    </div>`);
  renderLeadsRows(leads);
}

function filterLeads() {
  const nome = (document.getElementById('filterNome')?.value||'').toLowerCase();
  const etapa = document.getElementById('filterEtapa')?.value||'';
  const capital = parseFloat(document.getElementById('filterCapital')?.value||'0');
  renderLeadsRows(allLeads.filter(l =>
    (!nome || (l.nome||'').toLowerCase().includes(nome) || (l.email||'').toLowerCase().includes(nome)) &&
    (!etapa || l.etapa===etapa) &&
    (!capital || (l.capital_disponivel||0)>=capital)
  ));
}

function renderLeadsRows(leads) {
  const wrap = document.getElementById('leadsTableWrap');
  if (!wrap) return;
  if (!leads.length) {
    wrap.innerHTML = `<div class="table-wrap"><div class="empty-state"><div class="empty-icon">👤</div>Nenhum lead encontrado</div></div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>WhatsApp</th><th>Capital</th><th>Cidade</th><th>Etapa</th><th>Responsável</th><th>Ações</th></tr></thead>
        <tbody>
          ${leads.map(l => `<tr>
            <td><strong>${l.nome||'—'}</strong><div style="font-size:11px;color:var(--text-dim)">${l.email||''}</div></td>
            <td>${wapp(l.whatsapp)}</td>
            <td>${l.capital_disponivel||'—'}</td>
            <td>${l.cidade||'—'}</td>
            <td>${etapaBadge(l.etapa)}</td>
            <td>${l.responsavel||'—'}</td>
            <td><div class="table-actions">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="viewLead('${l.id}')" title="Ver">👁</button>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="editLead('${l.id}')" title="Editar">✏️</button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="deleteLead('${l.id}')" title="Excluir">🗑</button>
            </div></td>
          </tr>`).join('')}
        </tbody>

    </div>`;
}

function openNewLead() {
  showModal(`
    <div class="modal-header"><div class="modal-title">Novo Lead</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">${leadFormFields()}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveLead()">Salvar Lead</button>
    </div>`);
}

async function saveLead() {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { toast('Nome é obrigatório', 'error'); return; }
  const { error } = await db.from('crm_leads').insert(getLeadPayload());
  if (error) { toast('Erro: '+error.message, 'error'); return; }
  toast('Lead criado!', 'success'); closeModal(); renderLeads();
}

async function editLead(id) {
  const lead = allLeads.find(l => l.id==id);
  if (!lead) return;
  showModal(`
    <div class="modal-header"><div class="modal-title">Editar Lead</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">${leadFormFields(lead)}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="updateLead(${id})">Salvar</button>
    </div>`);
}

async function updateLead(id) {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { toast('Nome é obrigatório', 'error'); return; }
  const { error } = await db.from('crm_leads').update(getLeadPayload()).eq('id', id);
  if (error) { toast('Erro: '+error.message, 'error'); return; }
  toast('Lead atualizado!', 'success'); closeModal(); renderLeads();
}

function getLeadPayload() {
  return {
    nome: document.getElementById('fNome').value.trim(),
    whatsapp: document.getElementById('fWapp').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    capital_disponivel: document.getElementById('fCapital').value||null,
    cidade: document.getElementById('fCidade').value.trim(),
    etapa: document.getElementById('fEtapa').value,
    responsavel: document.getElementById('fResp').value.trim(),
    origem: document.getElementById('fOrigem').value,
    score: 0,
    notas: document.getElementById('fNotas').value.trim(),
  };
}

async function deleteLead(id) {
  const lead = allLeads.find(l => l.id==id);
  if (!confirm(`Excluir lead "${lead?.nome}"? Esta ação não pode ser desfeita.`)) return;
  const { error } = await db.from('crm_leads').delete().eq('id', id);
  if (error) { toast('Erro ao excluir', 'error'); return; }
  toast('Lead excluído', 'success'); renderLeads();
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
const ETAPAS = [
  {key:'lead',label:'Lead'},{key:'contato',label:'Contato'},{key:'qualificado',label:'Qualificado'},
  {key:'proposta',label:'Proposta'},{key:'negociacao',label:'Negociação'},
  {key:'fechado',label:'Fechado'},{key:'perdido',label:'Perdido'},
];

async function renderPipeline() {
  setMain(`<div class="topbar"><h1>⚡ Pipeline</h1></div><div class="content">${loadingHTML()}</div>`);
  const { data, error } = await db.from('crm_leads').select('*').order('criado_em', { ascending: false });
  if (error) { toast('Erro ao carregar pipeline', 'error'); return; }
  allLeads = data||[];
  buildKanban(allLeads);
}

function buildKanban(leads) {
  const cols = ETAPAS.map(e => {
    const cards = leads.filter(l => l.etapa===e.key);
    return `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-title">${e.label}</span>
          <span class="kanban-count">${cards.length}</span>
        </div>
        <div class="kanban-cards" data-etapa="${e.key}"
          ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${e.key}')">
          ${cards.map(l => `
            <div class="kanban-card" draggable="true" data-id="${l.id}"
              ondragstart="onDragStart(event,${l.id})" ondragend="onDragEnd(event)">
              <div class="kanban-card-name">${l.nome||'—'}</div>
              <div class="kanban-card-info">
                <span>📍 ${l.cidade||'—'}</span>
                <span>💰 ${fmtR(l.capital_disponivel)}</span>
                ${l.responsavel?`<span>👤 ${l.responsavel}</span>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
  setMain(`<div class="topbar"><h1>⚡ Pipeline</h1></div><div class="content"><div class="kanban-board">${cols}</div></div>`);
}

function onDragStart(e, id) {
  draggedLeadId = id; e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.kanban-cards').forEach(c => c.classList.remove('drag-over'));
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

async function onDrop(e, etapa) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!draggedLeadId) return;
  const lead = allLeads.find(l => l.id===draggedLeadId);
  if (!lead || lead.etapa===etapa) return;
  const { error } = await db.from('crm_leads').update({ etapa }).eq('id', draggedLeadId);
  if (error) { toast('Erro ao mover lead', 'error'); return; }
  lead.etapa = etapa;
  toast(`Movido para ${etapa}`, 'success');
  buildKanban(allLeads);
}

// ── TAREFAS ───────────────────────────────────────────────────────────────────
async function renderTarefas() {
  setMain(`<div class="topbar"><h1>✅ Tarefas</h1></div><div class="content">${loadingHTML()}</div>`);
  const [{ data: tarefas }, { data: leads }] = await Promise.all([
    db.from('crm_tarefas').select('*').order('data_vencimento', { ascending: true, nullsFirst: false }),
    db.from('crm_leads').select('id,nome'),
  ]);
  allTarefas = tarefas||[];
  window._leads = leads||[];
  buildTarefasPage(allTarefas);
}

function buildTarefasPage(tarefas) {
  setMain(`
    <div class="topbar">
      <h1>✅ Tarefas</h1>
      <div class="topbar-actions"><button class="btn btn-primary" onclick="openNewTarefa()">+ Nova Tarefa</button></div>
    </div>
    <div class="content">
      <div class="filters">
        <select class="filter-input" id="ftStatus" onchange="filterTarefas()">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_andamento">Em Andamento</option>
          <option value="concluida">Concluída</option>
        </select>
        <select class="filter-input" id="ftPrior" onchange="filterTarefas()">
          <option value="">Todas prioridades</option>
          <option value="alta">Alta</option><option value="media">Média</option><option value="baixa">Baixa</option>
        </select>
        <input class="filter-input" id="ftResp" placeholder="Filtrar por responsável" oninput="filterTarefas()">
      </div>
      <div id="tarefasWrap"></div>
    </div>`);
  renderTarefasRows(tarefas);
}

function filterTarefas() {
  const status = document.getElementById('ftStatus')?.value||'';
  const prior = document.getElementById('ftPrior')?.value||'';
  const resp = (document.getElementById('ftResp')?.value||'').toLowerCase();
  renderTarefasRows(allTarefas.filter(t =>
    (!status||t.status===status) && (!prior||t.prioridade===prior) &&
    (!resp||(t.responsavel||'').toLowerCase().includes(resp))
  ));
}

function renderTarefasRows(tarefas) {
  const wrap = document.getElementById('tarefasWrap');
  if (!wrap) return;
  const leads = window._leads||[];
  const hoje = new Date().toISOString().split('T')[0];
  if (!tarefas.length) {
    wrap.innerHTML = `<div class="table-wrap"><div class="empty-state"><div class="empty-icon">✅</div>Nenhuma tarefa</div></div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th></th><th>Título</th><th>Lead</th><th>Responsável</th><th>Vencimento</th><th>Prioridade</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>
          ${tarefas.map(t => {
            const lead = leads.find(l => l.id===t.lead_id);
            const vencida = t.data_vencimento && t.data_vencimento<hoje && t.status!=='concluida';
            return `<tr style="${vencida?'color:var(--danger)':''}">
              <td><input type="checkbox" class="task-check" ${t.status==='concluida'?'checked':''} onchange="toggleTarefa(${t.id},this.checked)"></td>
              <td>
                <strong style="text-decoration:${t.status==='concluida'?'line-through':''}">${t.titulo||'—'}</strong>
                ${t.descricao?`<div style="font-size:11px;color:var(--text-dim)">${t.descricao.slice(0,55)}${t.descricao.length>55?'…':''}</div>`:''}
              </td>
              <td>${lead?lead.nome:'—'}</td>
              <td>${t.responsavel||'—'}</td>
              <td style="color:${vencida?'var(--danger)':'inherit'}">${t.data_vencimento?new Date(t.data_vencimento+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</td>
              <td>${priorBadge(t.prioridade)}</td>
              <td>${taskStatusBadge(t.status)}</td>
              <td><div class="table-actions">
                <button class="btn btn-ghost btn-sm btn-icon" onclick="editTarefa(${t.id})" title="Editar">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTarefa(${t.id})" title="Excluir">🗑</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function toggleTarefa(id, checked) {
  const status = checked ? 'concluida' : 'pendente';
  const { error } = await db.from('crm_tarefas').update({ status }).eq('id', id);
  if (error) { toast('Erro ao atualizar', 'error'); return; }
  const t = allTarefas.find(t => t.id===id);
  if (t) t.status = status;
  toast(checked ? 'Tarefa concluída!' : 'Tarefa reaberta', 'success');
}

async function renderRelatorios() {
  setMain(`<div class="topbar"><h1>📈 Relatórios</h1></div><div class="content">${loadingHTML()}</div>`);
  loadRelatorios();
}

async function loadRelatorios() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - relPeriodo);

  const [{ data: leads }, { data: negocios }] = await Promise.all([
    db.from('crm_leads').select('*').gte('criado_em', cutoff.toISOString()).order('criado_em', { ascending: false }),
    db.from('crm_negocios').select('*').order('criado_em', { ascending: false }),
  ]);

  const L = leads||[], N = negocios||[];
  const fechados = L.filter(l => l.etapa==='fechado');
  const perdidos = L.filter(l => l.etapa==='perdido');
  const taxa = L.length>0 ? (fechados.length/L.length*100).toFixed(1) : '0';
  const receitaFechada = N.filter(n => n.status==='fechado').reduce((s,n) => s+(n.valor||0), 0);
  const ticketMedio = fechados.length>0 ? fechados.reduce((s,l) => s+(l.capital_disponivel||0), 0)/fechados.length : 0;

  const porCapital = groupBy(L, l => {
    const c = l.capital_disponivel||0;
    if (c>=10000000) return '10M+';
    if (c>=5000000) return '5M–10M';
    if (c>=1000000) return '1M–5M';
    if (c>=500000) return '500k–1M';
    return 'Até 500k';
  });
  const porOrigem = groupBy(L, l => l.origem||'não informado');
  const porCidade = groupBy(L, l => l.cidade||'Não informada');

  setMain(`
    <div class="topbar">
      <h1>📈 Relatórios</h1>
      <div class="topbar-actions">
        <div class="toggle-group">
          <button class="toggle-btn ${relPeriodo===7?'active':''}" onclick="setRelPeriodo(7)">7d</button>
          <button class="toggle-btn ${relPeriodo===30?'active':''}" onclick="setRelPeriodo(30)">30d</button>
          <button class="toggle-btn ${relPeriodo===90?'active':''}" onclick="setRelPeriodo(90)">90d</button>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(175px,1fr));margin-bottom:22px">
        ${statCard('👤','Leads Captados', L.length)}
        ${statCard('📊','Taxa de Conversão', taxa+'%','gold')}
        ${statCard('💰','Receita Fechada', fmtR(receitaFechada),'green')}
        ${statCard('🎯','Ticket Médio', fmtR(ticketMedio),'gold')}
        ${statCard('🏆','Negócios Ganhos', fechados.length,'green')}
        ${statCard('❌','Negócios Perdidos', perdidos.length, perdidos.length>0?'red':'')}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
        <div class="card">
          <div class="section-title">Funil de Conversão</div>
          ${['lead','contato','qualificado','proposta','negociacao','fechado'].map(e => {
            const cnt = L.filter(l => l.etapa===e).length;
            const pct = L.length>0 ? (cnt/L.length*100).toFixed(0) : 0;
            return `<div class="funnel-row">
              <div class="funnel-label">${etapaBadge(e)}</div>
              <div class="funnel-bar-wrap"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
              <div class="funnel-count">${cnt} (${pct}%)</div>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div class="section-title">Por Capital Disponível</div>
          ${listGroup(porCapital, L.length)}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
        <div class="card">
          <div class="section-title">Por Origem</div>
          ${listGroup(porOrigem, L.length)}
        </div>
        <div class="card">
          <div class="section-title">Por Cidade</div>
          ${listGroup(porCidade, L.length)}
        </div>
      </div>
    </div>`);
}

function listGroup(obj, total) {
  const sorted = Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0,8);
  if (!sorted.length) return '<div class="empty-state" style="padding:14px">Sem dados</div>';
  return sorted.map(([k,v]) => `
    <div class="funnel-row">
      <div class="funnel-label" style="font-size:12px;color:var(--text)">${k}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar-fill" style="width:${total>0?(v/total*100).toFixed(0):0}%"></div></div>
      <div class="funnel-count">${v}</div>
    </div>`).join('');
}

          <div><div class="detail-label">Versão</div><div class="detail-value">2.0.0</div></div>
          <div><div class="detail-label">URL Supabase</div><div class="detail-value" style="font-size:11px;color:var(--text-dim)">${SUPABASE_URL}</div></div>
        </div>
      </div>
    </div>`);
}

function openNovoUsuario() {
  showModal(`
    <div class="modal-header"><div class="modal-title">Novo Usuário</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nome *</label><input class="form-control" id="uNome" placeholder="Nome completo"></div>
        <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="uEmail" type="email" placeholder="email@exemplo.com"></div>
        <div class="form-group"><label class="form-label">WhatsApp</label><input class="form-control" id="uWapp" placeholder="(11) 99999-9999"></div>
        <div class="form-group"><label class="form-label">Cargo</label><input class="form-control" id="uCargo" placeholder="Consultor, Gestor..."></div>
        <div class="form-group full"><label class="form-label">Meta Mensal (R$)</label><input class="form-control" id="uMeta" type="number" placeholder="0"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUsuario()">Salvar</button>
    </div>`);
}

async function saveUsuario() {
  const nome = document.getElementById('uNome').value.trim();
  if (!nome) { toast('Nome é obrigatório', 'error'); return; }
  const { error } = await db.from('crm_usuarios').insert({
    nome, email: document.getElementById('uEmail').value.trim(),
    whatsapp: document.getElementById('uWapp').value.trim(),
    cargo: document.getElementById('uCargo').value.trim(),
    meta_mensal: parseFloat(document.getElementById('uMeta').value)||null,
  });
  if (error) { toast('Erro: '+error.message, 'error'); return; }
  toast('Usuário adicionado!', 'success'); closeModal(); renderConfig();
}
</script>
</body>
</html>
