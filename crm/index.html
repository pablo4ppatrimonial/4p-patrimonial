<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4P Patrimonial — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{--bg:#080808;--surface:#111111;--surface2:#181818;--border:#2a2a2a;--gold:#c9a84c;--gold-dim:#9a7a35;--gold-glow:rgba(201,168,76,0.12);--text:#f0f0f0;--text-dim:#888;--text-muted:#555;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--font:'Sora',sans-serif;--display:'Playfair Display',serif;--mono:'JetBrains Mono',monospace;--radius:10px;--sidebar:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;}
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.login-box{width:380px;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:var(--radius);padding:48px 40px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo strong{display:block;font-family:var(--display);font-size:22px;color:var(--gold);letter-spacing:2px;}
.login-logo p{color:var(--text-muted);font-size:12px;margin-top:4px;letter-spacing:1px;}
.login-box label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.login-box input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.login-box input:focus{border-color:var(--gold);}
.login-btn{width:100%;margin-top:20px;padding:13px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s;}
.login-btn:hover{opacity:.85;}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;}
#sidebar{width:var(--sidebar);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;overflow:hidden;}
.sidebar-shimmer{height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);background-size:200% 100%;animation:shimmer 2.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sidebar-logo{padding:20px 20px 18px;border-bottom:1px solid var(--border);}
.sidebar-logo strong{display:block;font-family:var(--display);color:var(--gold);font-size:18px;letter-spacing:2px;}
.sidebar-logo span{color:var(--text-muted);font-size:11px;letter-spacing:1px;}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;color:var(--text-dim);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;user-select:none;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--gold);background:var(--gold-glow);border-left-color:var(--gold);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
#main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.page-header{padding:24px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#0d0d0d 0%,#080808 100%);position:sticky;top:0;z-index:50;}
.page-header h1{font-size:20px;font-weight:700;font-family:var(--display);letter-spacing:.5px;}
.page-content{padding:28px 32px;flex:1;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-gold{background:var(--gold);color:#000;}.btn-gold:hover{opacity:.85;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}.btn-danger:hover{background:var(--red);color:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
.stat-card:hover{border-color:var(--gold-dim);box-shadow:0 0 20px var(--gold-glow);}
.stat-card-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.07;pointer-events:none;}
.stat-card.novos-hoje{animation:pulseBorder 2s ease-in-out infinite;}
@keyframes pulseBorder{0%,100%{border-color:var(--border)}50%{border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow)}}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--text);font-family:var(--mono);}
.stat-value.gold{color:var(--gold);}.stat-value.green{color:var(--green);}.stat-value.red{color:var(--red);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--surface2);}
th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;border-left:2px solid transparent;}
tbody tr:hover{background:var(--surface2);border-left-color:var(--gold);}
.td-name{font-weight:600;}.td-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-lead{background:rgba(59,130,246,.2);color:#60a5fa;}
.badge-contato{background:rgba(168,85,247,.2);color:#c084fc;}
.badge-qualificado{background:rgba(234,179,8,.2);color:#fbbf24;}
.badge-proposta{background:rgba(249,115,22,.2);color:#fb923c;}
.badge-negociacao{background:rgba(239,68,68,.2);color:#f87171;}
.badge-fechado{background:rgba(34,197,94,.2);color:#4ade80;}
.badge-perdido{background:rgba(100,100,100,.2);color:#9ca3af;}
.badge-aberto{background:rgba(239,68,68,.2);color:#f87171;}
.badge-em_andamento{background:rgba(234,179,8,.2);color:#fbbf24;}
.badge-resolvido{background:rgba(34,197,94,.2);color:#4ade80;}
.badge-pendente{background:rgba(234,179,8,.2);color:#fbbf24;}
.badge-concluida{background:rgba(34,197,94,.2);color:#4ade80;}
.badge-alta{background:rgba(239,68,68,.2);color:#f87171;}
.badge-media{background:rgba(234,179,8,.2);color:#fbbf24;}
.badge-baixa{background:rgba(34,197,94,.2);color:#4ade80;}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.filter-select{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--gold);}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(-16px)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:16px;font-weight:700;font-family:var(--display);}
.modal-close{width:30px;height:30px;border-radius:6px;background:var(--surface2);border:none;color:var(--text-dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:var(--red);color:#fff;}
.modal-body{padding:24px;}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}.form-group.full{grid-column:1/-1;}
.form-group label{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group select option{background:var(--surface2);}
.form-group textarea{resize:vertical;min-height:80px;}
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;}
.kanban-col{min-width:220px;max-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;transition:border-color .15s;}
.kanban-col-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
.kanban-count{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;font-family:var(--mono);}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;}
.kanban-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:grab;transition:border-color .15s,transform .1s;}
.kanban-card:hover{border-color:var(--gold-dim);}
.kanban-card.dragging{opacity:.5;transform:scale(.98);}
.kanban-col.drag-over{border-color:var(--gold);background:var(--gold-glow);}
.kanban-card-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.kanban-card-info{font-size:11px;color:var(--text-dim);}
.kanban-card-capital{font-size:11px;color:var(--gold);margin-top:4px;font-weight:600;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.chart-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:4px 4px 0 0;min-height:2px;}
.bar-label{font-size:10px;color:var(--text-muted);}.bar-val{font-size:10px;color:var(--text-dim);font-family:var(--mono);}
.funil-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.funil-label{font-size:12px;color:var(--text-dim);width:100px;text-align:right;}
.funil-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:20px;overflow:hidden;}
.funil-bar{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:4px;transition:width .5s;}
.funil-num{font-size:11px;font-weight:700;color:var(--text-dim);width:30px;text-align:right;font-family:var(--mono);}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;max-width:320px;border:1px solid;}
.toast.success{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green);}
.toast.error{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}}
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:8px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.dash-card-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.detail-row{display:flex;border-bottom:1px solid var(--border);padding:10px 0;}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;width:140px;flex-shrink:0;padding-top:1px;}
.detail-val{font-size:13px;color:var(--text);}
.task-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.task-item.vencida{border-color:rgba(239,68,68,.4);}
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-check.done{background:var(--green);border-color:var(--green);}
.task-check.done::after{content:'✓';font-size:11px;color:#fff;font-weight:700;}
.task-info{flex:1;}.task-title{font-size:13px;font-weight:600;}
.task-meta{font-size:11px;color:var(--text-dim);margin-top:2px;}
.task-actions{display:flex;gap:6px;align-items:center;}
.action-btn{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;font-family:var(--font);white-space:nowrap;background:transparent;}
.action-btn-view{border-color:var(--border);color:var(--text-dim);}.action-btn-view:hover{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.1);}
.action-btn-edit{border-color:var(--border);color:var(--text-dim);}.action-btn-edit:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}
.action-btn-del{border-color:var(--border);color:var(--text-dim);}.action-btn-del:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);}
@media(max-width:768px){:root{--sidebar:0px;}#sidebar{transform:translateX(-240px);width:240px;}#sidebar.open{transform:translateX(0);}#main{margin-left:0;}.hamburger{display:flex!important;}.form-grid{grid-template-columns:1fr;}.dash-grid{grid-template-columns:1fr;}.stats-grid{grid-template-columns:1fr 1fr;}.page-content{padding:16px;}.page-header{padding:16px;}}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.hamburger span{width:18px;height:2px;background:var(--text-dim);border-radius:2px;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><strong>4P Patrimonial</strong><p>CRM COMERCIAL</p></div>
    <div class="form-group" style="margin-bottom:16px"><label>Senha de acesso</label><input type="password" id="login-pass" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Entrar no CRM</button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>
<div id="app" style="display:none;width:100%">
<nav id="sidebar">
  <div class="sidebar-shimmer"></div>
  <div class="sidebar-logo"><strong>4P Patrimonial</strong><span>CRM COMERCIAL</span></div>
  <div class="sidebar-nav">
    <div class="nav-item active" onclick="goTo('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="goTo('leads')"><span class="nav-icon">👥</span> Leads</div>
    <div class="nav-item" onclick="goTo('pipeline')"><span class="nav-icon">🎯</span> Pipeline</div>
    <div class="nav-item" onclick="goTo('tarefas')"><span class="nav-icon">✅</span> Tarefas</div>
    <div class="nav-item" onclick="goTo('tickets')"><span class="nav-icon">🎫</span> Tickets</div>
    <div class="nav-item" onclick="goTo('relatorios')"><span class="nav-icon">📈</span> Relatórios</div>
    <div class="nav-item" onclick="goTo('config')"><span class="nav-icon">⚙️</span> Configurações</div>
  </div>
  <div class="sidebar-footer"><button class="logout-btn" onclick="doLogout()">Sair do sistema</button></div>
</nav>
<div id="main">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <h1 id="page-title">Dashboard</h1>
    </div>
    <div id="header-action"></div>
  </div>
  <div class="page-content" id="page-content"><div class="loading"><span class="spinner"></span> Carregando...</div></div>
</div>
</div>
<div id="toast-container"></div>

<!-- MODAL LEAD -->
<div class="modal-overlay" id="modal-lead">
  <div class="modal">
    <div class="modal-header"><h2 id="modal-lead-title">Novo Lead</h2><button class="modal-close" onclick="closeModal('modal-lead')">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Nome completo *</label><input id="f-nome" placeholder="Nome do lead"></div>
        <div class="form-group"><label>WhatsApp</label><input id="f-whatsapp" placeholder="11999999999"></div>
        <div class="form-group"><label>E-mail</label><input id="f-email" type="email" placeholder="email@exemplo.com"></div>
        <div class="form-group"><label>Capital disponível</label>
          <select id="f-capital"><option value="">Selecione o capital</option><option>Até R$50k</option><option>R$50k a R$150k</option><option>R$150k a R$300k</option><option>R$300k a R$500k</option><option>R$500k a R$1M</option><option>Acima de R$1M</option></select>
        </div>
        <div class="form-group"><label>Cidade</label><input id="f-cidade" placeholder="Ex: Praia Grande"></div>
        <div class="form-group"><label>Etapa</label>
          <select id="f-etapa"><option value="lead">Lead</option><option value="contato">Contato</option><option value="qualificado">Qualificado</option><option value="proposta">Proposta</option><option value="negociacao">Negociação</option><option value="fechado">Fechado</option><option value="perdido">Perdido</option></select>
        </div>
        <div class="form-group"><label>Responsável</label><input id="f-responsavel" placeholder="Nome do responsável"></div>
        <div class="form-group"><label>Origem</label>
          <select id="f-origem"><option value="site">Site</option><option value="meta_ads">Meta Ads</option><option value="instagram">Instagram</option><option value="indicacao">Indicação</option><option value="whatsapp">WhatsApp</option><option value="evento">Evento</option><option value="outro">Outro</option></select>
        </div>
        <div class="form-group full"><label>Notas</label><textarea id="f-notas" placeholder="Observações sobre o lead..."></textarea></div>
      </div>

  if(e)f=f.filter(l=>l.etapa===e);if(k)f=f.filter(l=>l.capital_disponivel===k);
  const el=document.getElementById('leads-table');if(!el)return;
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div>Nenhum lead encontrado</div>';return;}
  el.innerHTML='<table><thead><tr><th>Nome / E-mail</th><th>WhatsApp</th><th>Capital</th><th>Cidade</th><th>Etapa</th><th>Responsável</th><th>Origem</th><th>Ações</th></tr></thead><tbody>'+
  f.map(l=>`<tr>
    <td><div class="td-name">${l.nome||'—'}</div><div class="td-sub">${l.email||''}</div></td>
    <td>${l.whatsapp?`<a href="https://wa.me/55${l.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:var(--green);text-decoration:none">📱 ${l.whatsapp}</a>`:'—'}</td>

    <td><div style="display:flex;gap:6px">
      <button class="action-btn action-btn-view" onclick="verLead('${l.id}')">👁 Ver</button>
      <button class="action-btn action-btn-edit" onclick="editarLead('${l.id}')">✏️ Editar</button>
      <button class="action-btn action-btn-del" onclick="excluirLead('${l.id}','${(l.nome||'').replace(/'/g,"\\'")}')">🗑</button>
    </div></td>
  </tr>`).join('')+'</tbody></table>';
}

const etapas=['lead','contato','qualificado','proposta','negociacao','fechado','perdido'];

async function renderPipeline(){

let editingUsuarioId=null;
function abrirNovoUsuario(){
  editingUsuarioId=null;
  ['nome','email','whats','meta'].forEach(f=>document.getElementById('u-'+f).value='');
  document.getElementById('u-cargo').value='vendedor';
  document.getElementById('modal-usuario-title').textContent='Novo Membro da Equipe';
  openModal('modal-usuario');
}
function editarUsuario(id){
  // busca nos dados já carregados — recarrega se necessário
  sb.from('crm_usuarios').select('*').eq('id',id).single().then(({data:u})=>{
    if(!u)return;
    editingUsuarioId=id;
    document.getElementById('u-nome').value=u.nome||'';
    document.getElementById('u-email').value=u.email||'';
    document.getElementById('u-whats').value=u.whatsapp||'';
    document.getElementById('u-cargo').value=u.cargo||'vendedor';
    document.getElementById('u-meta').value=u.meta_mensal||0;
    document.getElementById('modal-usuario-title').textContent='Editar Membro';
    openModal('modal-usuario');
  });
}
async function salvarUsuario(){
  const nome=document.getElementById('u-nome').value.trim();
  const email=document.getElementById('u-email').value.trim();
  if(!nome||!email){toast('Nome e e-mail são obrigatórios','error');return;}
  const payload={nome,email,whatsapp:document.getElementById('u-whats').value.trim(),cargo:document.getElementById('u-cargo').value,meta_mensal:parseFloat(document.getElementById('u-meta').value)||0,ativo:true};
  let error;
  if(editingUsuarioId){
    ({error}=await sb.from('crm_usuarios').update(payload).eq('id',editingUsuarioId));
  }else{
    payload.criado_em=new Date().toISOString();
    ({error}=await sb.from('crm_usuarios').insert(payload));
  }
  if(error){toast('Erro: '+error.message,'error');return;}
  toast(editingUsuarioId?'Membro atualizado!':'Membro adicionado!');
  closeModal('modal-usuario');renderConfig();
}
function excluirUsuario(id,nome){
  confirmar(`Remover "${nome}" da equipe?`,async()=>{
    const{error}=await sb.from('crm_usuarios').delete().eq('id',id);
    if(error){toast('Erro: '+error.message,'error');return;}
    toast('Membro removido!');renderConfig();
  });
}
