<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4P CRM — Equipe de Vendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #e0c06a; --gold-dark: #a8832a;
      --bg: #0A0A0A; --bg-1: #111111; --bg-2: #181818; --bg-3: #1e1e1e;
      --text: #F0EDE8; --text-muted: #888880; --text-dim: #555;
      --border: rgba(201,168,76,0.2); --border-s: rgba(255,255,255,0.07);
      --red: #ef4444; --yellow: #f59e0b; --green: #22c55e; --blue: #3b82f6;
      --r: 10px; --sidebar-w: 240px;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* LOGIN */
    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 40px 32px;
      text-align: center;
    }
    .login-card .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--gold); margin-bottom: 6px;
    }
    .login-card .logo-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 32px; }
    .login-card input {
      width: 100%; padding: 12px 14px;
      background: var(--bg-2); border: 1px solid var(--border-s);
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; margin-bottom: 14px; transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--gold); }
    .login-card .btn-login {
      width: 100%; padding: 12px;
      background: var(--gold); color: #0A0A0A;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 0.06em;
      border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;
    }
    .login-card .btn-login:hover { background: var(--gold-light); }
    .login-err { color: var(--red); font-size: 0.82rem; margin-top: 10px; display: none; }

    /* APP LAYOUT */
    #app { display: none; height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100%; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg-1);
      border-right: 1px solid var(--border-s);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border-s);
    }
    .sidebar-logo .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--gold); display: block;
    }
    .sidebar-logo .brand-sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.06em; }
    .sidebar nav { padding: 12px 10px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: var(--text-muted); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg-2); color: var(--text); }
    .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold); }
    .nav-item .nav-icon { width: 18px; text-align: center; font-size: 1rem; }
    .sidebar-footer {
      padding: 12px 10px;
      border-top: 1px solid var(--border-s);
    }
    .btn-logout {
      width: 100%; padding: 9px; background: none;
      border: 1px solid var(--border-s); border-radius: 8px;
      color: var(--text-muted); font-size: 0.82rem; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      padding: 16px 24px; border-bottom: 1px solid var(--border-s);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .topbar .actions { display: flex; gap: 10px; align-items: center; }
    .content { padding: 24px; flex: 1; }

    /* CARDS */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .metric-card {
      background: var(--bg-1); border: 1px solid var(--border-s);
      border-radius: var(--r); padding: 18px 20px;
    }
    .metric-card .m-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.04em; }
    .metric-card .m-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .metric-card .m-value.gold { color: var(--gold); }
    .metric-card .m-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 10px 12px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-muted);
      border-bottom: 1px solid var(--border-s);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border-s); transition: background 0.1s; }
    tbody tr:hover { background: var(--bg-1); }
    tbody td { padding: 11px 12px; font-size: 0.85rem; color: var(--text); vertical-align: middle; }

    /* BADGES */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge-novo { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .badge-contato { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-qualificado { background: rgba(168,85,247,0.15); color: #c084fc; }
    .badge-proposta { background: rgba(20,184,166,0.15); color: #2dd4bf; }
    .badge-negociacao { background: rgba(201,168,76,0.15); color: var(--gold); }
    .badge-fechado { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-perdido { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-aberto { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-andamento { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-resolvido { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-alta { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-media { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-baixa { background: rgba(34,197,94,0.15); color: #4ade80; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 7px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap;
    }
    .btn-primary { background: var(--gold); color: #0A0A0A; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border-s); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* FILTERS */
    .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
    .filter-input {
      padding: 8px 12px; background: var(--bg-1);
      border: 1px solid var(--border-s); border-radius: 7px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      outline: none; transition: border-color 0.2s; min-width: 160px;
    }
    .filter-input:focus { border-color: var(--gold); }
    .filter-input option { background: #181818; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--r); width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .modal-header {
      padding: 20px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-1); z-index: 1;
      padding-bottom: 16px; border-bottom: 1px solid var(--border-s);
    }
    .modal-header h2 { font-size: 1rem; font-weight: 600; color: #fff; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.3rem; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px 24px; }

    /* FORM IN MODAL */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    .field label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.03em;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 12px;
      background: var(--bg-2); border: 1px solid var(--border-s);
      border-radius: 7px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .field select { appearance: none; cursor: pointer; }
    .field select option { background: #181818; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-s);
      display: flex; gap: 10px; justify-content: flex-end;
    }

    /* TABS */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-s); margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 16px; background: none; border: none;
      color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* KANBAN */
    .kanban-wrap { overflow-x: auto; padding-bottom: 12px; }
    .kanban { display: flex; gap: 14px; min-width: max-content; align-items: flex-start; }
    .kanban-col {
      width: 220px; background: var(--bg-1);
      border: 1px solid var(--border-s); border-radius: var(--r);
      flex-shrink: 0;
    }
    .kanban-col-header {
      padding: 12px 14px; border-bottom: 1px solid var(--border-s);
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-header .col-name {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .kanban-col-header .col-count {
      background: var(--bg-3); color: var(--text-muted);
      font-size: 0.72rem; padding: 2px 7px; border-radius: 100px;
    }
    .kanban-cards { padding: 10px; min-height: 80px; }
    .kanban-card {
      background: var(--bg-2); border: 1px solid var(--border-s);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
      cursor: grab; transition: border-color 0.15s; user-select: none;
    }
    .kanban-card:hover { border-color: var(--border); }
    .kanban-card.dragging { opacity: 0.5; }
    .kanban-cards.drag-over { background: rgba(201,168,76,0.05); border-radius: 8px; }
    .kcard-name { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .kcard-meta { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
    .kcard-capital { font-size: 0.78rem; color: var(--gold); margin-top: 6px; }

    /* CHART BARS */
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 100px; margin: 16px 0; }
    .bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .bar {
      width: 100%; background: rgba(201,168,76,0.3);
      border-radius: 4px 4px 0 0; min-height: 4px;
      transition: background 0.2s;
    }
    .bar:hover { background: var(--gold); }
    .bar-label { font-size: 0.68rem; color: var(--text-muted); text-align: center; }

    /* FUNNEL */
    .funnel { max-width: 400px; margin: 20px auto; }
    .funnel-step {
      display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
    }
    .funnel-bar-wrap { flex: 1; }
    .funnel-bar {
      height: 28px; background: rgba(201,168,76,0.2); border-radius: 4px;
      position: relative; overflow: hidden;
    }
    .funnel-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      border-radius: 4px;
    }
    .funnel-label { font-size: 0.75rem; color: var(--text-muted); width: 90px; text-align: right; }
    .funnel-pct { font-size: 0.72rem; color: var(--gold); width: 36px; }

    /* TOAST */
    #toastContainer {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 12px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      animation: toastIn 0.25s ease; pointer-events: all; min-width: 240px;
      border: 1px solid;
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .toast-success { background: rgba(34,197,94,0.1); color: #4ade80; border-color: rgba(34,197,94,0.25); }
    .toast-error { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.25); }
    .toast-info { background: rgba(59,130,246,0.1); color: #93c5fd; border-color: rgba(59,130,246,0.25); }

    /* MISC */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-head h3 { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.88rem; }
    .score-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
    }
    .priority-high { color: var(--red); }
    .priority-mid { color: var(--yellow); }
    .priority-low { color: var(--green); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card {
      background: var(--bg-1); border: 1px solid var(--border-s);
      border-radius: var(--r); padding: 20px;
    }
    .card h4 { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
    .activity-item { padding: 10px 0; border-bottom: 1px solid var(--border-s); }
    .activity-item:last-child { border-bottom: none; }
    .activity-item .a-type { font-size: 0.72rem; color: var(--gold); font-weight: 600; margin-bottom: 3px; }
    .activity-item .a-desc { font-size: 0.85rem; color: var(--text); }
    .activity-item .a-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border-s);
    }
    .task-row:last-child { border-bottom: none; }
    .task-row input[type=checkbox] { accent-color: var(--gold); width: 15px; height: 15px; cursor: pointer; }
    .task-row .t-title { flex: 1; font-size: 0.85rem; }
    .task-row.done .t-title { text-decoration: line-through; color: var(--text-muted); }
    .task-group-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 16px 0 8px; border-bottom: 1px solid var(--border-s); margin-bottom: 4px;
    }
    .ticket-reply {
      background: var(--bg-2); border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .ticket-reply .r-author { font-size: 0.75rem; color: var(--gold); font-weight: 600; margin-bottom: 4px; }
    .ticket-reply .r-text { font-size: 0.85rem; }
    .ticket-reply .r-date { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
    .lead-score { font-weight: 700; }
    .score-high { color: #4ade80; }
    .score-mid { color: #fbbf24; }
    .score-low { color: #f87171; }
    .ranking-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border-s);
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-pos { font-size: 0.75rem; color: var(--text-muted); width: 18px; }
    .ranking-name { flex: 1; font-size: 0.88rem; }
    .ranking-val { font-size: 0.85rem; font-weight: 700; color: var(--gold); }
    .period-btns { display: flex; gap: 6px; }
    .period-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border-s);
      background: none; color: var(--text-muted); font-size: 0.78rem; cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: var(--border); }
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.8); display: none;
      align-items: center; justify-content: center;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--r); padding: 28px; max-width: 360px; text-align: center;
    }
    .confirm-box h3 { font-size: 1rem; margin-bottom: 10px; }
    .confirm-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">4P Patrimonial</div>
    <div class="logo-sub">CRM · EQUIPE DE VENDAS</div>
    <input type="password" id="loginPwd" placeholder="Senha de acesso" />
    <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="loginErr">Senha incorreta.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="brand">4P Patrimonial</span>
        <span class="brand-sub">CRM</span>
      </div>
      <nav>
        <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
        <div class="nav-item" data-page="leads"><span class="nav-icon">👥</span> Leads</div>
        <div class="nav-item" data-page="pipeline"><span class="nav-icon">🎯</span> Pipeline</div>
        <div class="nav-item" data-page="tarefas"><span class="nav-icon">✅</span> Tarefas</div>
        <div class="nav-item" data-page="tickets"><span class="nav-icon">🎫</span> Tickets</div>
        <div class="nav-item" data-page="relatorios"><span class="nav-icon">📈</span> Relatórios</div>
        <div class="nav-item" data-page="config"><span class="nav-icon">⚙️</span> Configurações</div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="mainContent"></main>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="leadModal">
  <div class="modal" style="max-width:760px">
    <div class="modal-header">
      <h2 id="leadModalTitle">Lead</h2>
      <button class="modal-close" onclick="closeModal('leadModal')">×</button>
    </div>
    <div class="modal-body" id="leadModalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="newLeadModal">
  <div class="modal">
    <div class="modal-header">

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin() {

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null, extra = {}) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SERVICE_KEY,
      'Authorization': `Bearer ${SERVICE_KEY}`,
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal',
      ...extra
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  if (!res.ok) {
    const t = await res.text();
    throw new Error(t);
  }
  try { return await res.json(); } catch { return null; }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function fmt(date) {
  if (!date) return '—';
  return new Date(date).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function fmtR(v) {
  if (!v && v !== 0) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:0 });
}
function etapaBadge(e) {
  const map = { lead:'novo', contato:'contato', qualificado:'qualificado', proposta:'proposta', negociacao:'negociacao', fechado:'fechado', perdido:'perdido', novo:'novo' };
  return `<span class="badge badge-${map[e]||'novo'}">${e||'—'}</span>`;
}
function statusBadge(s) {
  const map = { aberto:'aberto', 'em andamento':'andamento', resolvido:'resolvido' };
  return `<span class="badge badge-${map[s]||'aberto'}">${s||'—'}</span>`;
}
function priorBadge(p) {
  return `<span class="badge badge-${p||'media'}">${p||'—'}</span>`;
}
function scoreClass(s) { return s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low'; }

let confirmCb = null;
function openConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg || 'Deseja excluir este item?';
  confirmCb = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  confirmCb = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
document.getElementById('confirmOkBtn').onclick = () => { if (confirmCb) confirmCb(); closeConfirm(); };

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

}
document.querySelectorAll('.nav-item').forEach(el => {

});

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
async function renderDashboard() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Dashboard</h1></div><div class="content"><div class="empty-state">Carregando...</div></div>`;
  try {
    const [leads, tasks, tickets] = await Promise.all([
      api('crm_leads?select=*&order=created_at.desc'),
      api('crm_tarefas?select=*'),
      api('crm_tickets?select=*')
    ]);
    const hoje = new Date().toISOString().split('T')[0];
    const novosHoje = (leads||[]).filter(l => l.created_at && l.created_at.startsWith(hoje)).length;
    const emNeg = (leads||[]).filter(l => ['proposta','negociacao'].includes(l.etapa)).length;
    const fechados = (leads||[]).filter(l => l.etapa === 'fechado').length;
    const total = (leads||[]).length;
    const taxa = total > 0 ? Math.round(fechados/total*100) : 0;
    const tPend = (tasks||[]).filter(t => t.status === 'pendente').length;
    const tAberto = (tickets||[]).filter(t => t.status === 'aberto').length;
    const leadsFechados = (leads||[]).filter(l => l.etapa === 'fechado');
    const recPrev = leadsFechados.reduce((a,l) => a + (l.valor_negocio || 0), 0);
    // Bar chart last 7 days
    const days = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const ds = d.toISOString().split('T')[0];
      days.push({ label: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), count: (leads||[]).filter(l=>l.created_at&&l.created_at.startsWith(ds)).length });
    }
    const maxDay = Math.max(...days.map(d=>d.count), 1);
    const bars = days.map(d => `<div class="bar-group"><div class="bar" title="${d.count} leads" style="height:${Math.max(8,Math.round(d.count/maxDay*90))}px"></div><div class="bar-label">${d.label}</div></div>`).join('');
    // Tasks today
    const tasksTodayList = (tasks||[]).filter(t => t.data_vencimento && t.data_vencimento.startsWith(hoje) && t.status === 'pendente');
    // Hot leads
    const hotLeads = (leads||[]).filter(l => {
      const score = l.score || 0;
      const lastContact = l.ultimo_contato ? (Date.now() - new Date(l.ultimo_contato).getTime()) / 86400000 : 999;
      return score >= 60 || lastContact > 3;
    }).slice(0, 5);
    mc.innerHTML = `
      <div class="topbar"><h1>Dashboard</h1></div>
      <div class="content">
        <div class="metrics-grid">
          <div class="metric-card"><div class="m-label">Total de Leads</div><div class="m-value">${total}</div></div>
          <div class="metric-card"><div class="m-label">Novos hoje</div><div class="m-value gold">${novosHoje}</div></div>
          <div class="metric-card"><div class="m-label">Em negociação</div><div class="m-value">${emNeg}</div></div>
          <div class="metric-card"><div class="m-label">Fechados no mês</div><div class="m-value">${fechados}</div></div>
          <div class="metric-card"><div class="m-label">Taxa de conversão</div><div class="m-value gold">${taxa}%</div></div>
          <div class="metric-card"><div class="m-label">Receita prevista</div><div class="m-value" style="font-size:1.1rem">${fmtR(recPrev)}</div></div>
          <div class="metric-card"><div class="m-label">Tarefas pendentes</div><div class="m-value">${tPend}</div></div>
          <div class="metric-card"><div class="m-label">Tickets abertos</div><div class="m-value">${tAberto}</div></div>
        </div>
        <div class="two-col" style="margin-bottom:24px">
          <div class="card">
            <h4>Leads por dia — últimos 7 dias</h4>
            <div class="bar-chart">${bars}</div>
          </div>
          <div class="card">
            <h4>Tarefas de hoje</h4>
            ${tasksTodayList.length === 0 ? '<div class="empty-state" style="padding:20px">Nenhuma tarefa para hoje</div>' :
              tasksTodayList.map(t => `<div class="task-row"><input type="checkbox" onchange="completeTask(${t.id},this)"><span class="t-title">${t.titulo}</span>${priorBadge(t.prioridade)}</div>`).join('')}
          </div>
        </div>
        <div class="card">
          <h4>Leads quentes</h4>
          ${hotLeads.length === 0 ? '<div class="empty-state" style="padding:20px">Nenhum lead quente no momento</div>' :
            `<div class="table-wrap"><table>
              <thead><tr><th>Nome</th><th>Capital</th><th>Etapa</th><th>Score</th><th>Último contato</th></tr></thead>
              <tbody>${hotLeads.map(l => `<tr>
                <td><b>${l.nome||'—'}</b></td>
                <td>${l.capital_disponivel||'—'}</td>
                <td>${etapaBadge(l.etapa)}</td>
                <td><span class="lead-score ${scoreClass(l.score||0)}">${l.score||0}</span></td>
                <td>${fmt(l.ultimo_contato)}</td>
              </tr>`).join('')}</tbody>
            </table></div>`}
        </div>
      </div>`;
  } catch(e) {
    document.querySelector('#mainContent .content').innerHTML = `<div class="empty-state">Erro ao carregar: ${e.message}</div>`;
  }
}

// ─── LEADS ───────────────────────────────────────────────────────────────────
let allLeads = [];
let editingLeadId = null;

async function renderLeads() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Leads</h1><div class="actions"><button class="btn btn-primary" onclick="openNewLead()">+ Novo Lead</button></div></div><div class="content"><div class="empty-state">Carregando...</div></div>`;

  } catch(e) { toast('Erro ao carregar leads: '+e.message,'error'); }
}

function renderLeadsTable(leads) {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="topbar"><h1>Leads <span style="color:var(--text-muted);font-size:0.85rem;font-weight:400">(${leads.length})</span></h1><div class="actions"><button class="btn btn-primary" onclick="openNewLead()">+ Novo Lead</button></div></div>
    <div class="content">
      <div class="filters">
        <input class="filter-input" id="searchLead" placeholder="Buscar por nome, email..." oninput="filterLeads()" style="flex:1;min-width:200px" />
        <select class="filter-input" id="filterEtapa" onchange="filterLeads()">
          <option value="">Todas etapas</option>
          <option>lead</option><option>contato</option><option>qualificado</option>
          <option>proposta</option><option>negociacao</option><option>fechado</option><option>perdido</option>
        </select>
        <select class="filter-input" id="filterCapital" onchange="filterLeads()">
          <option value="">Todo capital</option>
          <option>R$150k a R$300k</option><option>R$300k a R$500k</option><option>R$500k a R$1M</option><option>Acima de R$1M</option>
        </select>
      </div>
      <div class="table-wrap">
        <table id="leadsTable">
          <thead><tr>
            <th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Capital</th>
            <th>Cidade</th><th>Etapa</th><th>Responsável</th><th>Último contato</th><th>Score</th><th>Ações</th>
          </tr></thead>
          <tbody id="leadsTbody"></tbody>
        </table>
      </div>
      ${leads.length === 0 ? '<div class="empty-state" style="margin-top:20px">Nenhum lead cadastrado</div>' : ''}
    </div>`;
  populateLeadsRows(leads);
}

function filterLeads() {
  const q = document.getElementById('searchLead').value.toLowerCase();
  const et = document.getElementById('filterEtapa').value;
  const cap = document.getElementById('filterCapital').value;
  const filtered = allLeads.filter(l =>
    (!q || (l.nome||'').toLowerCase().includes(q) || (l.email||'').toLowerCase().includes(q) || (l.whatsapp||'').includes(q)) &&
    (!et || l.etapa === et) &&
    (!cap || l.capital_disponivel === cap)
  );
  populateLeadsRows(filtered);
}

function populateLeadsRows(leads) {
  const tb = document.getElementById('leadsTbody');
  if (!tb) return;
  if (leads.length === 0) { tb.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:32px">Nenhum lead encontrado</td></tr>`; return; }
  tb.innerHTML = leads.map(l => `<tr>
    <td><b>${l.nome||'—'}</b></td>
    <td>${l.whatsapp||'—'}</td>
    <td style="font-size:0.8rem">${l.email||'—'}</td>
    <td>${l.capital_disponivel||'—'}</td>
    <td>${l.cidade||'—'}</td>
    <td>${etapaBadge(l.etapa||'lead')}</td>
    <td>${l.responsavel||'—'}</td>
    <td>${fmt(l.ultimo_contato)}</td>
    <td><span class="lead-score ${scoreClass(l.score||0)}">${l.score||0}</span></td>
    <td style="white-space:nowrap">
      <button class="btn btn-ghost btn-sm" onclick="viewLead(${l.id})">Ver</button>
      <button class="btn btn-ghost btn-sm" onclick="editLead(${l.id})">Editar</button>
      <button class="btn btn-danger btn-sm" onclick="deleteLead(${l.id})">Excluir</button>
    </td>
  </tr>`).join('');
}

function openNewLead() {
  editingLeadId = null;
  document.getElementById('newLeadTitle').textContent = 'Novo Lead';
  ['fl_nome','fl_wpp','fl_email','fl_cidade','fl_resp','fl_notas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fl_capital').value = '';
  document.getElementById('fl_etapa').value = 'lead';
  document.getElementById('fl_origem').value = 'site';
  openModal('newLeadModal');
}

function editLead(id) {
  const l = allLeads.find(x => x.id === id);
  if (!l) return;
  editingLeadId = id;
  document.getElementById('newLeadTitle').textContent = 'Editar Lead';
  document.getElementById('fl_nome').value = l.nome || '';
  document.getElementById('fl_wpp').value = l.whatsapp || '';
  document.getElementById('fl_email').value = l.email || '';
  document.getElementById('fl_capital').value = l.capital_disponivel || '';
  document.getElementById('fl_cidade').value = l.cidade || '';
  document.getElementById('fl_etapa').value = l.etapa || 'lead';
  document.getElementById('fl_resp').value = l.responsavel || '';
  document.getElementById('fl_origem').value = l.origem || 'site';
  document.getElementById('fl_notas').value = l.notas || '';
  openModal('newLeadModal');
}

async function saveLead() {
  const btn = document.getElementById('saveLeadBtn');
  const nome = document.getElementById('fl_nome').value.trim();
  if (!nome) { toast('Nome é obrigatório','error'); return; }
  const data = {
    nome, whatsapp: document.getElementById('fl_wpp').value.trim(),
    email: document.getElementById('fl_email').value.trim(),
    capital_disponivel: document.getElementById('fl_capital').value,
    cidade: document.getElementById('fl_cidade').value.trim(),
    etapa: document.getElementById('fl_etapa').value,
    responsavel: document.getElementById('fl_resp').value.trim(),
    origem: document.getElementById('fl_origem').value,
    notas: document.getElementById('fl_notas').value.trim(),
    status: 'novo'
  };
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    if (editingLeadId) {
      await api(`crm_leads?id=eq.${editingLeadId}`, 'PATCH', data);
      toast('Lead atualizado!');
    } else {
      await api('crm_leads', 'POST', data);
      toast('Lead criado!');
    }
    closeModal('newLeadModal');
    renderLeads();
  } catch(e) { toast('Erro: '+e.message,'error'); }
  finally { btn.disabled = false; btn.textContent = 'Salvar lead'; }
}

async function deleteLead(id) {
  openConfirm('Excluir este lead? Todas as atividades vinculadas serão perdidas.', async () => {
    try {
      await api(`crm_leads?id=eq.${id}`, 'DELETE');
      toast('Lead excluído.');
      renderLeads();
    } catch(e) { toast('Erro: '+e.message,'error'); }
  });
}

      <button class="tab-btn" onclick="switchTab(this,'tab-tick-${id}')">Tickets</button>
    </div>
    <div id="tab-info-${id}" class="tab-panel active">

function switchTab(btn, panelId) {
  const container = btn.closest('.modal-body') || btn.closest('.content');
  container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  container.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

// ─── PIPELINE ─────────────────────────────────────────────────────────────────
const ETAPAS = ['lead','contato','qualificado','proposta','negociacao','fechado','perdido'];
const ETAPA_LABELS = { lead:'LEAD', contato:'CONTATO', qualificado:'QUALIFICADO', proposta:'PROPOSTA', negociacao:'NEGOCIAÇÃO', fechado:'FECHADO', perdido:'PERDIDO' };

async function renderPipeline() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Pipeline</h1><div class="actions"><input class="filter-input" id="pipeResp" placeholder="Filtrar por responsável" oninput="filterPipeline()" style="min-width:200px"/></div></div><div class="content"><div class="empty-state">Carregando...</div></div>`;
  try {
    allLeads = await api('crm_leads?select=*&order=created_at.desc') || [];
    renderKanban(allLeads);
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

function filterPipeline() {
  const resp = document.getElementById('pipeResp')?.value.toLowerCase() || '';
  renderKanban(resp ? allLeads.filter(l => (l.responsavel||'').toLowerCase().includes(resp)) : allLeads);
}

function renderKanban(leads) {
  const content = document.querySelector('#mainContent .content');
  if (!content) return;
  content.innerHTML = `<div class="kanban-wrap"><div class="kanban" id="kanbanBoard">
    ${ETAPAS.map(etapa => {
      const cards = leads.filter(l => (l.etapa||'lead') === etapa);
      return `<div class="kanban-col" data-etapa="${etapa}">
        <div class="kanban-col-header">
          <span class="col-name">${ETAPA_LABELS[etapa]}</span>
          <span class="col-count">${cards.length}</span>
        </div>
        <div class="kanban-cards" id="col-${etapa}" ondragover="colDragOver(event,this)" ondragleave="colDragLeave(this)" ondrop="colDrop(event,this,'${etapa}')">
          ${cards.map(l => `<div class="kanban-card" draggable="true" data-id="${l.id}" ondragstart="cardDragStart(event,this)">
            <div class="kcard-name">${l.nome||'—'}</div>
            <div class="kcard-meta">${l.cidade||'—'} · ${l.responsavel||'—'}</div>
            <div class="kcard-capital">${l.capital_disponivel||'—'}</div>
            ${l.valor_negocio ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">${fmtR(l.valor_negocio)}</div>` : ''}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
}

let draggedId = null;
function cardDragStart(e, el) { draggedId = el.dataset.id; el.classList.add('dragging'); }
function colDragOver(e, col) { e.preventDefault(); col.classList.add('drag-over'); }
function colDragLeave(col) { col.classList.remove('drag-over'); }
async function colDrop(e, col, etapa) {
  e.preventDefault(); col.classList.remove('drag-over');
  if (!draggedId) return;
  const id = parseInt(draggedId); draggedId = null;
  document.querySelectorAll('.kanban-card.dragging').forEach(el => el.classList.remove('dragging'));
  try {
    await api(`crm_leads?id=eq.${id}`, 'PATCH', { etapa });
    allLeads = allLeads.map(l => l.id === id ? {...l, etapa} : l);
    renderKanban(allLeads);
    toast('Etapa atualizada!');
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

// ─── TAREFAS ──────────────────────────────────────────────────────────────────
let allTasks = [];

async function renderTarefas() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Tarefas</h1><div class="actions"><button class="btn btn-primary" onclick="openModal('taskModal')">+ Nova Tarefa</button></div></div><div class="content"><div class="empty-state">Carregando...</div></div>`;
  try {
    allTasks = await api('crm_tarefas?select=*&order=data_vencimento.asc') || [];
    renderTasksList(allTasks);
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

function renderTasksList(tasks) {
  const content = document.querySelector('#mainContent .content');
  if (!content) return;
  const hoje = new Date().toISOString().split('T')[0];
  const fimSemana = new Date(); fimSemana.setDate(fimSemana.getDate()+7);
  const groups = {
    vencidas: tasks.filter(t => t.data_vencimento && t.data_vencimento < hoje && t.status !== 'concluida'),
    hoje: tasks.filter(t => t.data_vencimento && t.data_vencimento.startsWith(hoje)),
    semana: tasks.filter(t => t.data_vencimento && t.data_vencimento > hoje && new Date(t.data_vencimento) <= fimSemana),
    proximas: tasks.filter(t => !t.data_vencimento || new Date(t.data_vencimento) > fimSemana)
  };
  const labels = { vencidas:'VENCIDAS', hoje:'HOJE', semana:'ESTA SEMANA', proximas:'PRÓXIMAS' };
  const colors = { vencidas:'var(--red)', hoje:'var(--gold)', semana:'var(--blue)', proximas:'var(--text-muted)' };
  content.innerHTML = `
    <div class="filters">
      <select class="filter-input" id="filterTaskResp" onchange="filterTasks()"><option value="">Todos responsáveis</option></select>
      <select class="filter-input" id="filterTaskStatus" onchange="filterTasks()">
        <option value="">Todos status</option><option value="pendente">Pendente</option><option value="concluida">Concluída</option>
      </select>
      <select class="filter-input" id="filterTaskPrior" onchange="filterTasks()">
        <option value="">Todas prioridades</option><option value="alta">Alta</option><option value="media">Média</option><option value="baixa">Baixa</option>
      </select>
    </div>
    ${Object.entries(groups).map(([k, ts]) => ts.length === 0 ? '' : `
      <div class="task-group-label" style="color:${colors[k]}">${labels[k]} (${ts.length})</div>
      ${ts.map(t => `<div class="task-row ${t.status==='concluida'?'done':''}">
        <input type="checkbox" ${t.status==='concluida'?'checked':''} onchange="completeTask(${t.id},this)">
        <span class="t-title">${t.titulo||'—'}</span>
        ${t.lead_id?`<span style="font-size:0.75rem;color:var(--text-muted)">Lead #${t.lead_id}</span>`:''}
        ${priorBadge(t.prioridade)}
        <span style="font-size:0.75rem;color:var(--text-muted)">${t.responsavel||''}</span>
        <span style="font-size:0.75rem;color:var(--text-muted);margin-left:auto">${fmt(t.data_vencimento)}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">×</button>
      </div>`).join('')}`).join('')}`;
}

function filterTasks() {
  const resp = document.getElementById('filterTaskResp')?.value || '';
  const status = document.getElementById('filterTaskStatus')?.value || '';
  const prior = document.getElementById('filterTaskPrior')?.value || '';
  const filtered = allTasks.filter(t =>
    (!resp || t.responsavel === resp) &&
    (!status || t.status === status) &&
    (!prior || t.prioridade === prior)
  );
  renderTasksList(filtered);
}

async function completeTask(id, checkbox) {
  const status = checkbox.checked ? 'concluida' : 'pendente';
  try {
    await api(`crm_tarefas?id=eq.${id}`, 'PATCH', { status });
    allTasks = allTasks.map(t => t.id === id ? {...t, status} : t);
    const row = checkbox.closest('.task-row');
    if (row) row.classList.toggle('done', checkbox.checked);
    toast(checkbox.checked ? 'Tarefa concluída!' : 'Tarefa reaberta.');
  } catch(e) { toast('Erro: '+e.message,'error'); checkbox.checked = !checkbox.checked; }
}

async function saveTask() {
  const btn = document.getElementById('saveTaskBtn');
  const titulo = document.getElementById('ft_titulo').value.trim();
  if (!titulo) { toast('Título é obrigatório','error'); return; }
  const data = {
    titulo,
    lead_id: document.getElementById('ft_lead').value ? parseInt(document.getElementById('ft_lead').value) : null,
    responsavel: document.getElementById('ft_resp').value.trim(),
    data_vencimento: document.getElementById('ft_data').value || null,
    prioridade: document.getElementById('ft_prior').value,
    descricao: document.getElementById('ft_desc').value.trim(),
    status: 'pendente'
  };
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    await api('crm_tarefas', 'POST', data);
    toast('Tarefa criada!');
    closeModal('taskModal');
    ['ft_titulo','ft_lead','ft_resp','ft_data','ft_desc'].forEach(id => document.getElementById(id).value='');
    if (currentPage === 'tarefas') renderTarefas();
  } catch(e) { toast('Erro: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='Salvar tarefa'; }
}

async function deleteTask(id) {
  openConfirm('Excluir esta tarefa?', async () => {
    try { await api(`crm_tarefas?id=eq.${id}`,'DELETE'); toast('Tarefa excluída.'); renderTarefas(); }
    catch(e) { toast('Erro: '+e.message,'error'); }
  });
}

// ─── TICKETS ──────────────────────────────────────────────────────────────────
let allTickets = [];
let editingTicketId = null;

async function renderTickets() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Tickets</h1><div class="actions"><button class="btn btn-primary" onclick="openNewTicket()">+ Novo Ticket</button></div></div><div class="content"><div class="empty-state">Carregando...</div></div>`;
  try {
    allTickets = await api('crm_tickets?select=*&order=created_at.desc') || [];
    const content = document.querySelector('#mainContent .content');

      <thead><tr><th>#</th><th>Lead</th><th>Título</th><th>Status</th><th>Prioridade</th><th>Responsável</th><th>Data</th><th>Ações</th></tr></thead>
      <tbody>${allTickets.length === 0 ? `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Nenhum ticket</td></tr>` :

function openNewTicket() {
  editingTicketId = null;
  document.getElementById('ticketModalTitle').textContent = 'Novo Ticket';
  document.getElementById('ticketModalBody').innerHTML = `
    <div class="form-grid">
      <div class="field full"><label>Título *</label><input id="ftic_titulo" /></div>
      <div class="field"><label>Lead (ID)</label><input id="ftic_lead" /></div>
      <div class="field"><label>Responsável</label><input id="ftic_resp" /></div>
      <div class="field"><label>Prioridade</label>
        <select id="ftic_prior"><option value="alta">Alta</option><option value="media">Média</option><option value="baixa">Baixa</option></select>
      </div>
      <div class="field full"><label>Descrição</label><textarea id="ftic_desc"></textarea></div>
    </div>`;
  document.getElementById('ticketModalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('ticketModal')">Cancelar</button>
    <button class="btn btn-primary" id="saveTicketBtn" onclick="saveTicket()">Salvar ticket</button>`;
  openModal('ticketModal');
}

async function saveTicket() {
  const btn = document.getElementById('saveTicketBtn');
  const titulo = document.getElementById('ftic_titulo')?.value.trim();
  if (!titulo) { toast('Título é obrigatório','error'); return; }
  const data = {
    titulo,
    lead_id: document.getElementById('ftic_lead')?.value ? parseInt(document.getElementById('ftic_lead').value) : null,

    descricao: document.getElementById('ftic_desc')?.value.trim(),
    status: 'aberto'
  };
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  try {
    await api('crm_tickets', 'POST', data);
    toast('Ticket criado!');
    closeModal('ticketModal');
    if (currentPage === 'tickets') renderTickets();
  } catch(e) { toast('Erro: '+e.message,'error'); }
  finally { if (btn) { btn.disabled=false; btn.textContent='Salvar ticket'; } }
}

async function viewTicket(id) {
  const t = allTickets.find(x => x.id === id) || {};
  document.getElementById('ticketModalTitle').textContent = `Ticket #${id} — ${t.titulo||''}`;
  document.getElementById('ticketModalBody').innerHTML = `
    <div style="margin-bottom:12px;display:flex;gap:8px">
      ${statusBadge(t.status||'aberto')} ${priorBadge(t.prioridade)}
      <span style="font-size:0.82rem;color:var(--text-muted)">Responsável: ${t.responsavel||'—'}</span>
    </div>
    <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:20px">${t.descricao||''}</p>
    <div id="ticketReplies-${id}"><div class="empty-state">Carregando respostas...</div></div>
    <div style="margin-top:16px">
      <div class="field"><label>Adicionar resposta</label><textarea id="tickReply-${id}" rows="3"></textarea></div>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="addTicketReply(${id})">Enviar resposta</button>
    </div>`;
  document.getElementById('ticketModalFooter').innerHTML = `
    <select id="tickStatus-${id}" class="filter-input" style="min-width:140px">
      <option value="aberto" ${t.status==='aberto'?'selected':''}>Aberto</option>
      <option value="em andamento" ${t.status==='em andamento'?'selected':''}>Em andamento</option>
      <option value="resolvido" ${t.status==='resolvido'?'selected':''}>Resolvido</option>
    </select>
    <button class="btn btn-primary" onclick="updateTicketStatus(${id})">Atualizar status</button>
    <button class="btn btn-ghost" onclick="closeModal('ticketModal')">Fechar</button>`;
  openModal('ticketModal');
  loadTicketReplies(id);

async function loadTicketReplies(ticketId) {
  const el = document.getElementById(`ticketReplies-${ticketId}`);
  if (!el) return;
  try {
    const rows = await api(`crm_ticket_respostas?ticket_id=eq.${ticketId}&order=created_at.asc`) || [];
    el.innerHTML = rows.length === 0 ? '<div class="empty-state">Nenhuma resposta ainda</div>' :
      rows.map(r=>`<div class="ticket-reply"><div class="r-author">${r.autor||'Equipe'}</div><div class="r-text">${r.texto||''}</div><div class="r-date">${fmt(r.created_at)}</div></div>`).join('');
  } catch { el.innerHTML = '<div class="empty-state">Erro ao carregar</div>'; }
}

async function addTicketReply(ticketId) {
  const txt = document.getElementById(`tickReply-${ticketId}`)?.value.trim();
  if (!txt) { toast('Escreva uma resposta','error'); return; }
  try {
    await api('crm_ticket_respostas', 'POST', { ticket_id: ticketId, texto: txt, autor: 'Equipe' });
    document.getElementById(`tickReply-${ticketId}`).value = '';
    toast('Resposta enviada!');
    loadTicketReplies(ticketId);
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function updateTicketStatus(ticketId) {
  const status = document.getElementById(`tickStatus-${ticketId}`)?.value;
  try {
    await api(`crm_tickets?id=eq.${ticketId}`, 'PATCH', { status });
    allTickets = allTickets.map(t => t.id === ticketId ? {...t, status} : t);
    toast('Status atualizado!');
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function deleteTicket(id) {
  openConfirm('Excluir este ticket?', async () => {
    try { await api(`crm_tickets?id=eq.${id}`,'DELETE'); toast('Ticket excluído.'); renderTickets(); }
    catch(e) { toast('Erro: '+e.message,'error'); }
  });
}

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
let relPeriod = 30;

async function renderRelatorios() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="topbar">
      <h1>Relatórios</h1>
      <div class="actions period-btns">
        <button class="period-btn ${relPeriod===7?'active':''}" onclick="setRelPeriod(7)">7 dias</button>
        <button class="period-btn ${relPeriod===30?'active':''}" onclick="setRelPeriod(30)">30 dias</button>
        <button class="period-btn ${relPeriod===90?'active':''}" onclick="setRelPeriod(90)">90 dias</button>
      </div>
    </div>
    <div class="content"><div class="empty-state">Carregando...</div></div>`;
  await loadRelatorios();
}

function setRelPeriod(p) { relPeriod = p; renderRelatorios(); }

async function loadRelatorios() {
  try {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - relPeriod);
    const [leads, negocios] = await Promise.all([
      api(`crm_leads?select=*&created_at=gte.${cutoff.toISOString()}&order=created_at.desc`),
      api(`crm_negocios?select=*&order=created_at.desc`)
    ]);
    const allL = leads || [];
    const total = allL.length;
    const fechados = allL.filter(l => l.etapa === 'fechado').length;
    const perdidos = allL.filter(l => l.etapa === 'perdido').length;
    const taxa = total > 0 ? Math.round(fechados/total*100) : 0;
    const recFechada = allL.filter(l=>l.etapa==='fechado').reduce((a,l)=>a+(l.valor_negocio||0),0);
    const ticket = fechados > 0 ? recFechada / fechados : 0;
    // Etapas funnel
    const etapaCounts = {};
    ETAPAS.forEach(e => { etapaCounts[e] = allL.filter(l=>(l.etapa||'lead')===e).length; });
    const maxFunnel = Math.max(...Object.values(etapaCounts), 1);
    // Capital dist
    const capGroups = {};
    allL.forEach(l => { const c = l.capital_disponivel||'Não informado'; capGroups[c]=(capGroups[c]||0)+1; });
    // Ranking vendedores
    const respMap = {};
    allL.filter(l=>l.etapa==='fechado').forEach(l => { if (l.responsavel) respMap[l.responsavel]=(respMap[l.responsavel]||0)+1; });
    const ranking = Object.entries(respMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    // Origem
    const origemMap = {};
    allL.forEach(l => { const o=l.origem||'desconhecido'; origemMap[o]=(origemMap[o]||0)+1; });

    const content = document.querySelector('#mainContent .content');
    content.innerHTML = `
      <div class="metrics-grid" style="margin-bottom:24px">
        <div class="metric-card"><div class="m-label">Leads captados</div><div class="m-value">${total}</div></div>
        <div class="metric-card"><div class="m-label">Taxa de conversão</div><div class="m-value gold">${taxa}%</div></div>
        <div class="metric-card"><div class="m-label">Receita fechada</div><div class="m-value" style="font-size:1.1rem">${fmtR(recFechada)}</div></div>
        <div class="metric-card"><div class="m-label">Ticket médio</div><div class="m-value" style="font-size:1.1rem">${fmtR(ticket)}</div></div>
        <div class="metric-card"><div class="m-label">Negócios ganhos</div><div class="m-value">${fechados}</div></div>
        <div class="metric-card"><div class="m-label">Negócios perdidos</div><div class="m-value" style="color:var(--red)">${perdidos}</div></div>
      </div>
      <div class="two-col" style="margin-bottom:24px">
        <div class="card">
          <h4>Funil de conversão</h4>
          <div class="funnel">
            ${ETAPAS.map(e => `<div class="funnel-step">
              <div class="funnel-label">${ETAPA_LABELS[e]}</div>
              <div class="funnel-bar-wrap">
                <div class="funnel-bar">
                  <div class="funnel-bar-fill" style="width:${Math.max(4,Math.round((etapaCounts[e]||0)/maxFunnel*100))}%"></div>
                </div>
              </div>
              <div class="funnel-pct">${etapaCounts[e]||0}</div>
            </div>`).join('')}
          </div>
        </div>
        <div class="card">
          <h4>Ranking de vendedores</h4>
          ${ranking.length === 0 ? '<div class="empty-state" style="padding:20px">Sem dados</div>' :
            ranking.map((r,i) => `<div class="ranking-item"><span class="ranking-pos">${i+1}.</span><span class="ranking-name">${r[0]}</span><span class="ranking-val">${r[1]} fechados</span></div>`).join('')}
        </div>
      </div>
      <div class="two-col">
        <div class="card">
          <h4>Leads por capital disponível</h4>
          ${Object.entries(capGroups).map(([k,v]) => `<div class="ranking-item"><span class="ranking-name">${k}</span><span class="ranking-val">${v}</span></div>`).join('') || '<div class="empty-state" style="padding:20px">Sem dados</div>'}
        </div>
        <div class="card">
          <h4>Leads por origem</h4>
          ${Object.entries(origemMap).map(([k,v]) => `<div class="ranking-item"><span class="ranking-name">${k}</span><span class="ranking-val">${v}</span></div>`).join('') || '<div class="empty-state" style="padding:20px">Sem dados</div>'}
        </div>
      </div>`;
  } catch(e) {
    document.querySelector('#mainContent .content').innerHTML = `<div class="empty-state">Erro: ${e.message}</div>`;
  }
}

// ─── CONFIGURAÇÕES ────────────────────────────────────────────────────────────
async function renderConfig() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="topbar"><h1>Configurações</h1><div class="actions"><button class="btn btn-primary" onclick="openNewUserModal()">+ Novo Usuário</button></div></div><div class="content"><div class="empty-state">Carregando...</div></div>`;
  try {
    const users = await api('crm_usuarios?select=*&order=nome.asc') || [];
    const content = document.querySelector('#mainContent .content');
    content.innerHTML = `
      <div class="card" style="margin-bottom:20px">
        <h4>Usuários da equipe</h4>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>E-mail</th><th>WhatsApp</th><th>Cargo</th><th>Meta mensal</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>${users.length === 0 ? `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Nenhum usuário</td></tr>` :
              users.map(u => `<tr>
                <td><b>${u.nome||'—'}</b></td>
                <td>${u.email||'—'}</td>
                <td>${u.whatsapp||'—'}</td>
                <td>${u.cargo||'—'}</td>
                <td>${fmtR(u.meta_mensal)}</td>
                <td><span class="badge ${u.ativo?'badge-fechado':'badge-perdido'}">${u.ativo?'Ativo':'Inativo'}</span></td>
                <td><button class="btn btn-ghost btn-sm" onclick="toggleUser(${u.id},${u.ativo})">${u.ativo?'Desativar':'Ativar'}</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <h4>Etapas do pipeline</h4>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
          ${ETAPAS.map(e => `<span class="badge badge-${e==='fechado'?'fechado':e==='perdido'?'perdido':'contato'}" style="font-size:0.8rem;padding:6px 14px">${ETAPA_LABELS[e]}</span>`).join('')}
        </div>
      </div>
      <div id="newUserFormWrap"></div>`;
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

function openNewUserModal() {
  const wrap = document.getElementById('newUserFormWrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="card">
      <h4>Novo usuário</h4>
      <div class="form-grid" style="margin-top:12px">
        <div class="field"><label>Nome *</label><input id="nu_nome" /></div>
        <div class="field"><label>E-mail</label><input id="nu_email" type="email" /></div>
        <div class="field"><label>WhatsApp</label><input id="nu_wpp" /></div>
        <div class="field"><label>Cargo</label><input id="nu_cargo" /></div>
        <div class="field"><label>Meta mensal (R$)</label><input id="nu_meta" type="number" /></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-primary" onclick="saveUser()">Salvar</button>
        <button class="btn btn-ghost" onclick="document.getElementById('newUserFormWrap').innerHTML=''">Cancelar</button>
      </div>
    </div>`;
}

async function saveUser() {
  const nome = document.getElementById('nu_nome')?.value.trim();
  if (!nome) { toast('Nome é obrigatório','error'); return; }
  try {
    await api('crm_usuarios', 'POST', {
      nome, email: document.getElementById('nu_email').value.trim(),
      whatsapp: document.getElementById('nu_wpp').value.trim(),
      cargo: document.getElementById('nu_cargo').value.trim(),
      meta_mensal: parseFloat(document.getElementById('nu_meta').value) || null,
      ativo: true
    });
    toast('Usuário criado!');
    renderConfig();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function toggleUser(id, ativo) {
  try {
    await api(`crm_usuarios?id=eq.${id}`, 'PATCH', { ativo: !ativo });
    toast(!ativo ? 'Usuário ativado!' : 'Usuário desativado.');
    renderConfig();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (sessionStorage.getItem('crm_auth') === '1') navigate('dashboard');
</script>
</body>
