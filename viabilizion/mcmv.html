<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viabilizion — Verificador de Enquadramento Caixa/MCMV</title>
  <meta name="description" content="Verifique se um imóvel se enquadra nas faixas do Minha Casa Minha Vida (MCMV) da Caixa Econômica Federal." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #e0c06a;
      --gold-dark: #a8832a;
      --bg: #0A0A0A;
      --bg-card: #111111;
      --bg-card2: #181818;
      --text: #F0EDE8;
      --text-muted: #888880;
      --border: rgba(201,168,76,0.25);
      --radius: 12px;
      --red: #d16565;
      --green: #6fbf8c;
      --yellow: #d4b34a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
      background: rgba(201,168,76,0.06);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 10px;
    }

    h1 em {
      font-style: normal;
      color: var(--gold);
    }

    .subtitle {
      font-size: clamp(0.95rem, 2.2vw, 1.05rem);
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
    }

    .link-voltar {
      display: inline-block;
      margin-top: 16px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .link-voltar:hover { text-decoration: underline; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 28px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    form .full { grid-column: 1 / -1; }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    input, select {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--gold);
    }

    select { cursor: pointer; }

    .ajuda {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
    }

    .linha-cidade {
      display: flex;
      gap: 8px;
    }

    .linha-cidade input {
      flex: 1;
    }

    .linha-cidade select {
      flex: 0 0 84px;
    }

    .btn-verificar {
      grid-column: 1 / -1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      background: var(--gold);
      border: 1px solid var(--gold);
      color: #0A0A0A;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .btn-verificar:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
    }

    .btn-verificar:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .resultado-mcmv {
      display: none;
      text-align: left;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
    }

    .resultado-mcmv.show {
      display: block;
    }

    .resultado-mcmv.sucesso {
      border-left-color: var(--green);
    }

    .resultado-mcmv.alerta {
      border-left-color: var(--yellow);
    }

    .resultado-mcmv.neutro {
      border-left-color: var(--text-muted);
    }

    .resultado-mcmv h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    .resultado-mcmv.sucesso h3 { color: var(--green); }
    .resultado-mcmv.alerta h3 { color: var(--yellow); }
    .resultado-mcmv.neutro h3 { color: var(--text); }

    .resultado-mcmv p {
      font-size: 0.9rem;
      color: var(--text);
      margin: 4px 0;
    }

    .resultado-mcmv .disclaimer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      font-style: italic;
      color: var(--text-muted);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="badge">Ferramenta</span>
      <h1>Verificador de Enquadramento <em>Caixa/MCMV</em></h1>
      <p class="subtitle">Veja se um imóvel se enquadra nas faixas do Minha Casa Minha Vida</p>
      <a class="link-voltar" href="/viabilizion/index.html">&larr; voltar para o Viabilizion</a>
    </header>

    <div class="card">
      <form id="form-mcmv">
        <label class="full">
          Cidade
          <div class="linha-cidade">
            <input type="text" id="input-cidade-mcmv" placeholder="Nome da cidade" autocomplete="off" required />
            <select id="input-uf-mcmv" required>
              <option value="" disabled selected>UF</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>
          </div>
          <span class="ajuda" id="status-cidade-mcmv">Preencha cidade e UF para buscarmos a população automaticamente.</span>
        </label>

        <label class="full" id="campo-populacao-manual" style="display: none;">
          População estimada da cidade
          <input type="number" id="input-populacao-manual" min="0" step="1" />
          <span class="ajuda">Não encontramos a população dessa cidade. Você pode consultar no IBGE (Estimativas de População) ou preencher aproximadamente.</span>
        </label>

        <label class="full">Tipo de imóvel
          <select id="tipo-imovel" required>
            <option value="" disabled selected>Selecione</option>
            <option value="Apartamento">Apartamento</option>
            <option value="Casa">Casa</option>
          </select>
        </label>

        <label>Área da unidade (m²)
          <input type="text" inputmode="decimal" id="area-unidade" placeholder="0" required />
        </label>

        <label>Preço de venda da unidade (R$)
          <input type="text" inputmode="decimal" id="preco-venda-mcmv" placeholder="0" required />
        </label>

        <button type="submit" class="btn-verificar">Verificar</button>
      </form>

      <div id="resultado-mcmv" class="resultado-mcmv"></div>
    </div>
  </div>

  <footer>Viabilizion &mdash; dados para decisões imobiliárias mais seguras</footer>

  <script src="/viabilizion/config.js"></script>
  <script>
    const form = document.getElementById('form-mcmv');
    const resultadoMcmv = document.getElementById('resultado-mcmv');

    const inputCidadeMcmv = document.getElementById('input-cidade-mcmv');
    const selectUfMcmv = document.getElementById('input-uf-mcmv');
    const statusCidadeMcmv = document.getElementById('status-cidade-mcmv');
    const campoPopulacaoManual = document.getElementById('campo-populacao-manual');
    const inputPopulacaoManual = document.getElementById('input-populacao-manual');
    const selectTipoImovel = document.getElementById('tipo-imovel');
    const inputAreaUnidade = document.getElementById('area-unidade');
    const inputPrecoVenda = document.getElementById('preco-venda-mcmv');
    const botaoVerificar = form.querySelector('.btn-verificar');

    let populacaoAtual = null;

    function headersSupabase() {
      return {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      };
    }

    function formatarMoeda(valor) {
      return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // --- Formatação de milhar (pt-BR) nos campos de área/valor ---

    function apenasDigitos(valor) {
      return valor.replace(/\D/g, '');
    }

    function obterValorNumerico(input) {
      const digitos = apenasDigitos(input.value);
      return digitos === '' ? 0 : parseInt(digitos, 10);
    }

    function configurarCampoMilhar(input) {
      input.addEventListener('input', () => {
        const cursorPos = input.selectionStart;
        const digitosAntesCursor = apenasDigitos(input.value.slice(0, cursorPos)).length;

        const digitos = apenasDigitos(input.value);
        const numero = digitos === '' ? null : parseInt(digitos, 10);
        input.value = numero === null ? '' : numero.toLocaleString('pt-BR');

        let contador = 0;
        let novaPos = input.value.length;
        for (let i = 0; i < input.value.length; i++) {
          if (/\d/.test(input.value[i])) contador++;
          if (contador === digitosAntesCursor) {
            novaPos = i + 1;
            break;
          }
        }
        input.setSelectionRange(novaPos, novaPos);
      });
    }

    [inputAreaUnidade, inputPrecoVenda].forEach(configurarCampoMilhar);

    function mostrarResultadoMcmv(html, classe) {
      resultadoMcmv.innerHTML = html;
      resultadoMcmv.className = `resultado-mcmv show ${classe}`;
    }

    async function buscarPopulacaoCidade() {
      const cidade = inputCidadeMcmv.value.trim();
      const uf = selectUfMcmv.value;
      if (!cidade || !uf) return;

      statusCidadeMcmv.textContent = 'Buscando cidade...';
      populacaoAtual = null;

      try {
        const url = `${SUPABASE_URL}/rest/v1/cidades?nome=ilike.*${encodeURIComponent(cidade)}*&uf=eq.${uf}&select=populacao&limit=1`;
        const resposta = await fetch(url, { headers: headersSupabase() });

        if (!resposta.ok) {
          throw new Error(`Erro na consulta (status ${resposta.status})`);
        }

        const dados = await resposta.json();

        if (dados.length > 0 && dados[0].populacao != null) {
          populacaoAtual = Number(dados[0].populacao);
          statusCidadeMcmv.textContent = `População: ${populacaoAtual.toLocaleString('pt-BR')} habitantes.`;
          campoPopulacaoManual.style.display = 'none';
          inputPopulacaoManual.required = false;
        } else {
          statusCidadeMcmv.textContent =
            dados.length === 0
              ? 'Cidade ainda não cadastrada — preencha a população manualmente.'
              : 'Cidade encontrada, mas sem população cadastrada — preencha manualmente.';
          campoPopulacaoManual.style.display = 'flex';
          inputPopulacaoManual.required = true;
        }
      } catch (erro) {
        statusCidadeMcmv.textContent = 'Não foi possível buscar a cidade agora — preencha a população manualmente.';
        campoPopulacaoManual.style.display = 'flex';
        inputPopulacaoManual.required = true;
      }
    }

    inputCidadeMcmv.addEventListener('blur', buscarPopulacaoCidade);
    selectUfMcmv.addEventListener('change', () => {
      if (inputCidadeMcmv.value.trim()) {
        buscarPopulacaoCidade();
      }
    });

    form.addEventListener('submit', async (evento) => {
      evento.preventDefault();

      const tipoImovel = selectTipoImovel.value;
      const areaUnidade = obterValorNumerico(inputAreaUnidade);
      const precoVenda = obterValorNumerico(inputPrecoVenda);
      const populacao = populacaoAtual != null ? populacaoAtual : Number(inputPopulacaoManual.value);

      if (!tipoImovel || !areaUnidade || !precoVenda || !populacao) {
        mostrarResultadoMcmv('<p>Preencha todos os campos para verificar o enquadramento.</p>', 'neutro');
        return;
      }

      botaoVerificar.disabled = true;
      botaoVerificar.textContent = 'Verificando...';

      try {
        const headers = headersSupabase();

        const urlFaixa =
          `${SUPABASE_URL}/rest/v1/faixas_mcmv?teto_imovel=gte.${precoVenda}` +
          `&populacao_cidade_min=lte.${populacao}` +
          `&or=(populacao_cidade_max.gte.${populacao},populacao_cidade_max.is.null)` +
          `&order=teto_imovel.asc&limit=1`;
        const respostaFaixa = await fetch(urlFaixa, { headers });

        if (!respostaFaixa.ok) {
          throw new Error(`Erro na consulta de faixas (status ${respostaFaixa.status})`);
        }

        const faixas = await respostaFaixa.json();

        if (faixas.length === 0) {
          mostrarResultadoMcmv(`
            <h3>Este imóvel está acima dos tetos do MCMV</h3>
            <p>Financiamento possível apenas via SBPE/SFH, sem subsídio, com juros de mercado.</p>
          `, 'neutro');
          return;
        }

        const faixa = faixas[0];

        const urlMetragem = `${SUPABASE_URL}/rest/v1/metragem_minima_mcmv?tipo_imovel=eq.${encodeURIComponent(tipoImovel)}&select=metragem_minima&limit=1`;
        const respostaMetragem = await fetch(urlMetragem, { headers });
        const metragens = respostaMetragem.ok ? await respostaMetragem.json() : [];
        const metragemMinima = metragens.length > 0 ? Number(metragens[0].metragem_minima) : null;

        if (metragemMinima != null && areaUnidade < metragemMinima) {
          mostrarResultadoMcmv(`
            <h3>⚠️ Preço se enquadra, mas a área está abaixo do mínimo exigido (${metragemMinima} m²)</h3>
            <p>Área informada: ${areaUnidade} m² &middot; Faixa: ${faixa.faixa}</p>
          `, 'alerta');
          return;
        }

        const subsidioHtml =
          faixa.subsidio_max != null
            ? `<p><strong>Subsídio máximo:</strong> ${formatarMoeda(faixa.subsidio_max)}</p>`
            : '';

        mostrarResultadoMcmv(`
          <h3>✅ Enquadra na ${faixa.faixa}</h3>
          <p><strong>Teto do imóvel:</strong> ${formatarMoeda(faixa.teto_imovel)}</p>
          <p><strong>Faixa de juros:</strong> ${faixa.taxa_juros_min ?? '-'}% a ${faixa.taxa_juros_max ?? '-'}% a.a.</p>
          ${subsidioHtml}
          <p class="disclaimer">Sujeito à análise de crédito da Caixa Econômica Federal — este é um enquadramento indicativo, não uma aprovação.</p>
        `, 'sucesso');
      } catch (erro) {
        mostrarResultadoMcmv('<p>Não foi possível verificar o enquadramento agora. Tente novamente.</p>', 'neutro');
      } finally {
        botaoVerificar.disabled = false;
        botaoVerificar.textContent = 'Verificar';
      }
    });
  </script>
</body>
</html>
